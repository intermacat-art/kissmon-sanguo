<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>親親獸剪紙三國</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; background:#0a0a0a; overflow:hidden;
               font-family:"Microsoft JhengHei","Noto Sans TC","Arial",sans-serif; }
  body { display:flex; justify-content:center; align-items:center; }
  #game { position:relative; width:1280px; height:720px; box-shadow:0 0 40px rgba(0,0,0,0.6); }
  canvas { display:block; background:#2a1f1b; image-rendering:auto; }
  #ult-img { position:absolute; top:0; left:0; width:100%; height:100%;
             display:none; z-index:20; object-fit:cover; }
  #loading { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center;
             color:#fff; font-size:32px; background:#000; z-index:50; cursor:pointer; gap:24px; }
  #loading .start-btn { font-size:40px; font-weight:900; padding:18px 60px; background:#ffd84d; color:#2a1f1b;
             border-radius:14px; box-shadow:0 6px 0 #8B6914; letter-spacing:2px; display:none; }
  #loading.ready .loading-text { display:none; }
  #loading.ready .start-btn { display:block; animation:pulseBtn 0.9s ease-in-out infinite alternate; }
  @keyframes pulseBtn { from { transform:scale(1); } to { transform:scale(1.06); } }
  .minion { position:absolute; left:0; top:0; pointer-events:none; display:none; z-index:5;
            image-rendering:auto; will-change:transform; transform-origin:top left;
            object-fit:contain; }
  #pig-hud { position:absolute; left:24px; top:140px; display:none; gap:6px;
             z-index:15; pointer-events:none; }
  #pig-hud img { width:46px; height:46px; display:block; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas" width="1280" height="720"></canvas>
  <img id="mn-bb" class="minion" src="a/minion/bb.gif">
  <img id="mn-kid" class="minion" src="a/minion/kid.gif">
  <div id="pig-hud"></div>
  <img id="ult-img" src="a/ult/final.jpg">
  <video id="outro" src="a/outro.mp4" preload="auto"
         style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;z-index:22;"
         playsinline></video>
  <div id="loading">
    <div class="loading-text">Loading...</div>
    <div class="start-btn">▶  點擊開始</div>
  </div>
</div>
<script>
// ============================================================================
// Constants & Assets
// ============================================================================
const W = 1280, H = 720;
const CANVAS = document.getElementById('canvas');
const ctx = CANVAS.getContext('2d');

const IMG_PATHS = {
  bg:'a/battle.jpg', flags:'a/flags.png', menu_bg:'a/menu_bg.jpg',
  boom:'a/boom.png', hit:'a/hit.png', scissor:'a/scissor.png',
  kiss1:'a/menu/kiss1.png', kiss2:'a/menu/kiss2.png', kiss3:'a/menu/kiss3.png',
  walk1:'a/mon/walk1.png', walk2:'a/mon/walk2.png', attack:'a/mon/attack.png',
  drink:'a/mon/drink.png', smoke:'a/mon/smoke.gif',
  heart:'a/item/heart.png', can:'a/item/can.png',
  rrrr:'a/dead/rrrr.png',
  lv1:'a/lv/lv1.png',
  lv2:'a/lv/lv2.png',
  lv3:'a/lv/lv3.png',
  lv4:'a/lv/lv4.png',
  lv5:'a/lv/lv5.png',
  intro1:'a/intro/lv1.jpg',
  intro2:'a/intro/lv2.jpg',
  intro3:'a/intro/lv3.jpg',
  intro4:'a/intro/lv4.jpg',
  intro5:'a/intro/lv5.jpg',
  final2:'a/final2.jpg',
};
const SFX_PATHS = {
  cut:'a/se/cut.aac', miss:'a/se/miss.aac', heal:'a/se/heal.aac',
  dead:'a/se/dead.aac', ult:'a/se/ult.aac',
  coin:'a/se/coin.mp3', lvup:'a/se/LVUP.mp3',
  die:'a/se/enemy_die.mp3',
  shoot:'a/se/shoot.mp3',
  magnet:'a/se/coin.mp3',
  girlhurt:'a/se/girlhurt.mp3',
  vtdown:'a/se/vtdown.mp3',
  explode:'a/se/explode.mp3',     // L1/L4 泰山壓頂黑影落地
};
const BGM_SRC = 'a/bgm/bgm.mp3';
const MENU_BGM_SRC = 'a/bgm/menu.mp3';

const imgs = {};
const sfx = {};
let bgm = null;
let menuBgm = null;

function loadAssets() {
  const ps = [];
  for (const k in IMG_PATHS) {
    const im = new Image();
    im.src = IMG_PATHS[k];
    imgs[k] = im;
    ps.push(new Promise(r => { im.onload = r; im.onerror = () => { console.warn('fail', IMG_PATHS[k]); r(); }; }));
  }
  for (const k in SFX_PATHS) {
    const a = new Audio(SFX_PATHS[k]);
    a.volume = 0.7;
    sfx[k] = a;
  }
  bgm = new Audio(BGM_SRC);
  bgm.loop = true;
  bgm.volume = 0.3;
  menuBgm = new Audio(MENU_BGM_SRC);
  menuBgm.loop = true;
  menuBgm.volume = 0.4;
  return Promise.all(ps);
}

function playSfx(k, vol = 1) {
  try { const a = sfx[k].cloneNode(); a.volume = sfx[k].volume * vol; a.play(); } catch (e) {}
}

// 預渲染精英變色版本 — 避免每幀跑 ctx.filter (Chromium Windows 會 CPU fallback)
function prerenderElites() {
  for (const lvKey of ['lv1','lv2','lv3','lv4','lv5']) {
    const src = imgs[lvKey];
    if (!src || !src.naturalWidth) continue;
    for (const type of ELITE_TYPES) {
      const c = document.createElement('canvas');
      c.width = src.naturalWidth;
      c.height = src.naturalHeight;
      const cx = c.getContext('2d');
      cx.filter = type.filter;
      cx.drawImage(src, 0, 0);
      imgs[lvKey + '_' + type.name] = c;
    }
  }
  console.log('[perf] elite variants prerendered');
}

// ============================================================================
// State
// ============================================================================
// states: loading, menu, play, levelup, ult, dying, dead, victory
let state = 'loading';
let last = 0;
let keys = {};

const player = {

  passives: {},
  armor: 0,
  projSpeedMul: 1,
  critRate: 0,

let enemies = [];
let projectiles = [];
let pickups = [];
let particles = [];
let deathAnims = [];   // 敵人切半紙片動畫
let hitFx = [];        // BOSS 命中玩家「快速斬」特效
let slashHits = [];    // 玩家白弧斬擊命中敵人特效
let critLabels = [];   // 暴擊時跳出的「暴擊!」金字
let damageLabels = []; // 傷害浮字：[{x,y,text,color,start,isBig,vx}]
let boss = null;
let bossSpawned = false;
let bossIntroStart = 0;

let gameStartTime = 0;
let elapsed = 0;
let lastSpawn = 0;
let lastPickupSpawn = 0;
let killCount = 0;
let entityId = 0;
let levelUpChoices = [];
let ultStartTime = 0;
let dyingStart = 0;
let redFade = 0;

const SKILLS = {
  range:  { name:'靈氣放大',    desc:'剪刀靈氣範圍 +20%', max:5, weight:1, apply:()=>{ player.slashRange *= 1.20; } },

  hp:     { name:'體質強化',    desc:'血上限 +1 並回滿',  max:2, weight:1, apply:()=>{ player.maxHp += 1; player.hp = player.maxHp; } },

            apply: () => {
              const have = player.skills.kid || 0;
              if (have === 0) { player.kidShootInterval = 1500; player.kidShootDamage = 3; }
              else { player.kidShootInterval *= 0.88; player.kidShootDamage += 2; }
            } },
  pig:    { name:'豬鼻醬 守護', desc:'致命攻擊時擋 1 次並回滿血', max:2, weight:2, apply:()=>{ player.pigCharges++; } },
};

// 被動道具 — 由小怪掉落的寶箱開啟後三選一
const PASSIVES = {
  maxHp: { name:'強健體魄', desc:'血上限 +2（並回滿）',       max:5,
           apply: () => { player.maxHp += 2; player.hp = player.maxHp; } },
  move:  { name:'飛毛靴',   desc:'移動速度 +10%',            max:5,
           apply: () => { player.moveSpeed *= 1.10; } },
  atk:   { name:'急風紙扇', desc:'所有攻速 +10%',            max:5,
           apply: () => {
             player.attackInterval *= 0.90;
             if (player.kidShootInterval) player.kidShootInterval *= 0.90;
           } },
  proj:  { name:'銳利剪尖', desc:'投射物速度 +20%',          max:3,
           apply: () => { player.projSpeedMul = (player.projSpeedMul || 1) * 1.20; } },
  armor: { name:'紙鎧護身', desc:'受到傷害 -1（底線 1）',    max:3,
           apply: () => { player.armor = (player.armor || 0) + 1; } },
  crit:  { name:'銳利刀鋒', desc:'暴擊率 +10%（雙倍傷害）',  max:5,
           apply: () => { player.critRate = (player.critRate || 0) + 0.10; } },
};
let passivePicks = [];

// PROTOTYPE 平衡：每關軟性提升，玩家技能跨關保留會越來越強，敵人只要稍微提升讓新關有感即可
const LV = {
  1: {
    enemyImg: 'lv1', enemyHp: 4,  enemySpeed: 125, enemyDmg: 1, eliteRate: 0.10,
    bossHp: 120, bossSpeed: 75, bossTime: 60, bossSkill: 'jump',       bossSkillInterval: 12000,
    spawnCfg: [

      { from: 35, to: 60, interval: 850,  count: 1 },
    ],
  },
  2: {

    bossHp: 180, bossSpeed: 78, bossTime: 65, bossSkill: 'dash',       bossSkillInterval: 10000,
    spawnCfg: [
      { from: 0,  to: 18, interval: 1600, count: 1 },

    ],
  },
  3: {
    enemyImg: 'lv3', enemyHp: 10, enemySpeed: 145, enemyDmg: 1, eliteRate: 0.18,
    bossHp: 380, bossSpeed: 80, bossTime: 70, bossSkill: 'summon',    bossSkillInterval: 11000,
    spawnCfg: [
      { from: 0,  to: 20, interval: 1500, count: 1 },
      { from: 20, to: 45, interval: 1000, count: 2 },
      { from: 45, to: 70, interval: 750,  count: 2 },
    ],
  },
  4: {
    enemyImg: 'lv4', enemyHp: 14, enemySpeed: 145, enemyDmg: 2, eliteRate: 0.20,
    bossHp: 960, bossSpeed: 80, bossTime: 75, bossSkill: 'tripleJump',bossSkillInterval: 12000,
    spawnCfg: [
      { from: 0,  to: 22, interval: 1500, count: 1 },
      { from: 22, to: 50, interval: 1050, count: 2 },
      { from: 50, to: 75, interval: 800,  count: 2 },
    ],
  },
  5: {
    enemyImg: 'lv5', enemyHp: 20, enemySpeed: 155, enemyDmg: 2, eliteRate: 0.25,
    bossHp: 1540, bossSpeed: 82, bossTime: 80, bossSkill: 'mixed',     bossSkillInterval: 9000,
    spawnCfg: [
      { from: 0,  to: 25, interval: 1350, count: 2 },
      { from: 25, to: 55, interval: 950,  count: 2 },
      { from: 55, to: 80, interval: 700,  count: 3 },
    ],
  },
};

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

// 三種精英小怪型態（金色衝撞、紫色遠程、藍綠坦克）
const ELITE_TYPES = [
  { name:'rush',   filter:'hue-rotate(35deg) saturate(2.1) brightness(1.15)',  shadow:'#ffd000',
    hpMul:2.5, speedMul:1.15, dmgMul:1.5, sizeMul:1.2, xpDrop:3, ranged:false },
  { name:'ranged', filter:'hue-rotate(255deg) saturate(2.0) brightness(1.10)', shadow:'#c060ff',
    hpMul:1.8, speedMul:0.85, dmgMul:1.0, sizeMul:1.15, xpDrop:3, ranged:true, shootInterval:2400 },
  { name:'tank',   filter:'hue-rotate(155deg) saturate(1.9) brightness(0.95)', shadow:'#40dddd',
    hpMul:5.0, speedMul:0.70, dmgMul:1.8, sizeMul:1.35, xpDrop:5, ranged:false },
];
let currentLevel = 1;

const minionState = {
  bbAngle: 0, bbCooldown: 0, bbX: null, bbY: null,
  kidFloat: 0, kidCooldown: 0, kidX: null, kidY: null,
};

// ============================================================================
// Input
// ============================================================================
let pauseStart = 0;
function tryPlayMenuBgm() {
  if (state === 'menu' && menuBgm && menuBgm.paused) {
    menuBgm.play().catch(()=>{});
  }
}
addEventListener('keydown', e => {
  tryPlayMenuBgm();
  keys[e.code] = true;
  if (e.repeat) return;
  if (e.code === 'Escape') {
    e.preventDefault();
    // 救命鍵：奧義卡住時按 ESC 強制清乾淨回 play
    if (state === 'ult') {
      console.warn('[ESC] rescue from ult freeze');
      ultStartTime = 0;
      ultPhase = null;
      ultPhaseStart = 0;
      ultChain = []; ultTrail = []; ultHitCount = 0;
      document.getElementById('ult-img').style.display = 'none';
      state = 'play';
      last = performance.now();
      if (bgm) { try { bgm.volume = 0.3; } catch(e){} }
      return;
    }
    if (state === 'play') {
      state = 'paused';
      pauseStart = performance.now();
      if (bgm) bgm.pause();
    } else if (state === 'paused') {
      const pauseDur = performance.now() - pauseStart;
      gameStartTime += pauseDur;
      // 注意：不要動 last，main loop 每幀都會更新 last，暫停期間 last 已是最新
      // （之前誤加 last += pauseDur 會讓下一幀 dt < 0 → attackCooldown 累加 → 卡住攻擊）
      state = 'play';
      if (bgm) bgm.play().catch(()=>{});
    }
    return;
  }
  if (state === 'paused') {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      e.preventDefault();
      const d = e.code === 'ArrowLeft' ? -0.05 : 0.05;
      if (bgm)     bgm.volume     = Math.max(0, Math.min(1, bgm.volume + d));
      if (menuBgm) menuBgm.volume = Math.max(0, Math.min(1, menuBgm.volume + d));
      for (const k in sfx) sfx[k].volume = Math.max(0, Math.min(1, sfx[k].volume + d));
      return;
    } else if (e.code === 'KeyR') {
      e.preventDefault();
      const lv = currentLevel;
      resetGame();
      currentLevel = lv;
      state = 'play';
      if (bgm) { bgm.currentTime = 0; bgm.play().catch(()=>{}); }
      return;
    } else if (e.code === 'KeyM') {
      e.preventDefault();
      goMenu();
      return;
    }
  }
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'menu') startGame();
    else if (state === 'play') tryUlt();
    else if (state === 'dead' || state === 'victory' || state === 'final_victory') goMenu();
  } else if (state === 'levelup') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') chooseSkill(levelUpChoices[0]);
    else if (e.code === 'Digit2' || e.code === 'Numpad2') { if (levelUpChoices[1]) chooseSkill(levelUpChoices[1]); }
    else if (e.code === 'Digit3' || e.code === 'Numpad3') { if (levelUpChoices[2]) chooseSkill(levelUpChoices[2]); }
  } else if (state === 'passivePick') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') choosePassive(passivePicks[0]);
    else if (e.code === 'Digit2' || e.code === 'Numpad2') { if (passivePicks[1]) choosePassive(passivePicks[1]); }
    else if (e.code === 'Digit3' || e.code === 'Numpad3') { if (passivePicks[2]) choosePassive(passivePicks[2]); }
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });

// 切分頁 / 視窗失焦時清空所有按鍵狀態，避免 keyup 被吃掉導致方向鍵卡住
function clearAllKeys() { for (const k in keys) keys[k] = false; }
window.addEventListener('blur', clearAllKeys);
document.addEventListener('visibilitychange', () => { if (document.hidden) clearAllKeys(); });

CANVAS.addEventListener('click', e => {
  tryPlayMenuBgm();
  if (state !== 'levelup' && state !== 'passivePick') return;
  const rect = CANVAS.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const cardW = 310, cardH = 330, gap = 40;
  const totalW = cardW * 3 + gap * 2;
  const startX = (W - totalW) / 2;
  const cy = state === 'passivePick' ? 230 : 240;
  const picks = state === 'levelup' ? levelUpChoices : passivePicks;
  const pickFn = state === 'levelup' ? chooseSkill : choosePassive;
  for (let i = 0; i < picks.length; i++) {
    const cx = startX + i * (cardW + gap);
    if (mx >= cx && mx <= cx + cardW && my >= cy && my <= cy + cardH) {
      pickFn(picks[i]);
      return;
    }
  }
});

// ============================================================================
// Player
// ============================================================================
function updatePlayer(dt, now) {
  let vx = 0, vy = 0;
  if (keys.KeyW || keys.ArrowUp) vy -= 1;
  if (keys.KeyS || keys.ArrowDown) vy += 1;
  if (keys.KeyA || keys.ArrowLeft)  { vx -= 1; player.facing = -1; }
  if (keys.KeyD || keys.ArrowRight) { vx += 1; player.facing = 1; }
  if (vx || vy) {
    const l = Math.hypot(vx, vy);
    player.x += (vx/l) * player.moveSpeed * dt/1000;
    player.y += (vy/l) * player.moveSpeed * dt/1000;
    player.walkPhase += dt / 180;
  }
  player.x = Math.max(40, Math.min(W - 40, player.x));
  player.y = Math.max(60, Math.min(H - 40, player.y));

  // auto attack — 近戰 AOE
  player.attackCooldown -= dt;
  if (player.attackCooldown <= 0) {
    const t = nearestEnemy();
    if (t) {
      performSlash(now);
      player.attackCooldown = player.attackInterval;
      player.attackUntil = now + 220;
    }
  }

  // level up queue (handled after XP intake in updatePickups)
  if (state === 'play' && player.xp >= player.xpNeeded) {
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = xpCurve(player.level);
    triggerLevelUp();
  }
}

function drawPlayer() {
  // ult chain/finale 期間改由 drawUltEffect 畫玩家（瞬移位置 + 殘影）
  if (state === 'ult' && (ultPhase === 'chain' || ultPhase === 'finale')) return;
  const now = performance.now();
  const attacking = now < player.attackUntil;
  const moving = !!(keys.KeyW||keys.KeyA||keys.KeyS||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight);
  let img;
  if (now < player.animUntil && player.animType && imgs[player.animType] && imgs[player.animType].naturalWidth) {
    img = imgs[player.animType];
  }
  else if (attacking) img = imgs.attack;
  else if (moving) img = (Math.floor(player.walkPhase) % 2 === 0) ? imgs.walk1 : imgs.walk2;
  else img = imgs.walk1;
  if (!img || !img.naturalWidth) return;
  const w = 130;
  const h = w * img.naturalHeight / img.naturalWidth;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(player.facing, 1);
  if (now < player.iframeUntil) {
    ctx.globalAlpha = (Math.floor(now/80) % 2) ? 0.4 : 1.0;
  }
  ctx.drawImage(img, -w/2, -h/2 - 8, w, h);
  ctx.restore();
}

// ============================================================================
// Enemies & Boss
// ============================================================================
function spawnEnemy(isBoss = false) {
  const edge = (Math.random() * 4) | 0;
  const m = 60;
  let x, y;
  if (edge === 0)      { x = -m;    y = Math.random() * H; }
  else if (edge === 1) { x = W + m; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = -m; }
  else                 { x = Math.random() * W; y = H + m; }

  const cfg = LV[currentLevel];
  const img = imgs[cfg.enemyImg];
  if (isBoss) {
    boss = {
      id: ++entityId, x, y,
      hp: cfg.bossHp, maxHp: cfg.bossHp,
      speed: cfg.bossSpeed, r: 130,
      img, type: 'boss',
      w: 260, h: 260,
      dmg: 2, hitFlash: 0,
      ai: 'chase',
      // 出場 1 秒後立刻用招（lastSkillAt 往前調 (interval - 1000)）
      lastSkillAt: performance.now() - (cfg.bossSkillInterval || 12000) + 1000,
      shadows: [],
    };
    bossSpawned = true;
    bossIntroStart = performance.now();
  } else {
    const isElite = Math.random() < (cfg.eliteRate || 0);
    let eliteType = null;
    if (isElite) {
      eliteType = ELITE_TYPES[Math.floor(Math.random() * ELITE_TYPES.length)];
    }
    const baseR = 32, baseS = 70;
    // 精英用預渲染的變色版本，每幀 drawImage 時不用 ctx.filter
    const drawImg = isElite ? (imgs[cfg.enemyImg + '_' + eliteType.name] || img) : img;
    enemies.push({
      id: ++entityId, x, y,
      hp: isElite ? Math.ceil(cfg.enemyHp * eliteType.hpMul) : cfg.enemyHp,
      speed: isElite ? cfg.enemySpeed * eliteType.speedMul : cfg.enemySpeed,
      r: isElite ? Math.floor(baseR * eliteType.sizeMul) : baseR,
      img: drawImg,
      w: isElite ? Math.floor(baseS * eliteType.sizeMul) : baseS,
      h: isElite ? Math.floor(baseS * eliteType.sizeMul) : baseS,
      dmg: isElite ? Math.ceil(cfg.enemyDmg * eliteType.dmgMul) : cfg.enemyDmg,
      hitFlash: 0,
      lastHitPlayer: 0,
      isElite,
      eliteType,
      xpDrop: isElite ? eliteType.xpDrop : 1,
      shootCooldown: 0,
    });
  }
}

function updateEnemies(dt, now) {
  for (const e of enemies) {
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    const isRanged = e.isElite && e.eliteType && e.eliteType.ranged;
    if (isRanged) {
      // 遠程精英：保持 340-420 距離（太近逃、太遠追）+ 定期射擊
      const idealD = 380;
      if (d > idealD + 40) {
        e.x += (dx/d) * e.speed * dt/1000;
        e.y += (dy/d) * e.speed * dt/1000;
      } else if (d < idealD - 40) {
        e.x -= (dx/d) * e.speed * dt/1000;
        e.y -= (dy/d) * e.speed * dt/1000;
      }
      // 邊界夾制
      e.x = clamp(e.x, 40, W - 40);
      e.y = clamp(e.y, 40, H - 40);
      e.shootCooldown = (e.shootCooldown || 0) - dt;
      if (e.shootCooldown <= 0) {
        const speed = 420;
        projectiles.push({
          x: e.x, y: e.y,
          vx: (dx/d) * speed, vy: (dy/d) * speed,
          life: 2400, dmg: e.dmg || 1, pierce: 0, r: 14,
          source: 'enemy', hostile: true, hitIds: new Set(),
          angle: Math.atan2(dy, dx), color: '#c060ff',
        });
        e.shootCooldown = e.eliteType.shootInterval || 2400;
      }
    } else {
      if (d > 2) {
        e.x += (dx/d) * e.speed * dt/1000;
        e.y += (dy/d) * e.speed * dt/1000;
      }
    }
    if (d < e.r + player.r && now > player.iframeUntil) {
      hurtPlayer(e.dmg || 1, now);
    }
    if (e.hitFlash > 0) e.hitFlash -= dt;
  }
  enemies = enemies.filter(e => e.hp > 0);
  if (boss) updateBoss(dt, now);
  if (boss && boss.hp <= 0 && state === 'play') victory();
}

// ============================================================================
// Boss AI — state machine
// ============================================================================
function bossVulnerable() {
  return boss && (boss.ai === 'chase' || boss.ai === 'dashWarn' || boss.ai === 'dashing');
}

let _allTargetsCache = null;
let _allTargetsCacheFrame = -1;
let _frameId = 0;

function drawDashWarning() {
  if (!boss || boss.ai !== 'dashWarn') return;
  const now = performance.now();
  const pulse = 0.5 + Math.abs(Math.sin(now / 70)) * 0.5;
  ctx.save();
  ctx.strokeStyle = `rgba(255, 40, 40, ${pulse})`;
  ctx.lineWidth = 22;
  ctx.lineCap = 'round';
  ctx.setLineDash([32, 16]);
  ctx.lineDashOffset = -(now / 30);
  ctx.beginPath();
  ctx.moveTo(boss.dashFromX, boss.dashFromY);
  ctx.lineTo(boss.dashEndX, boss.dashEndY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}
function allTargets() {
  // 每幀只 concat 一次，多次呼叫共用同一 array（省 GC）
  if (_allTargetsCacheFrame === _frameId) return _allTargetsCache;
  _allTargetsCache = bossVulnerable() ? enemies.concat(boss) : enemies;
  _allTargetsCacheFrame = _frameId;
  return _allTargetsCache;
}

function updateBoss(dt, now) {
  if (!boss) return;
  // 偵測 hitFlash 剛被設（= 剛受傷），L2+ 播 girlhurt（防 spam：至少 200ms 間隔）
  const hitNow = boss.hitFlash > 120;
  if (currentLevel >= 2 && hitNow && !boss._hitFlashPrev) {
    if (!boss.lastHurtSfx || now - boss.lastHurtSfx > 200) {
      playSfx('girlhurt', 0.55);
      boss.lastHurtSfx = now;
    }
  }
  boss._hitFlashPrev = hitNow;
  if (boss.hitFlash > 0) boss.hitFlash -= dt;

  switch (boss.ai) {
    case 'chase': {
      const dx = player.x - boss.x, dy = player.y - boss.y;
      const d = Math.hypot(dx, dy) || 1;
      boss.x += (dx/d) * boss.speed * dt/1000;
      boss.y += (dy/d) * boss.speed * dt/1000;
      if (d < boss.r + player.r && now > player.iframeUntil) {
        hurtPlayer(boss.dmg || 2, now);
      }
      // 招式冷卻
      const cfg = LV[currentLevel];
      if (now - boss.lastSkillAt > (cfg.bossSkillInterval || 12000)) {
        beginBossSkill(now, cfg.bossSkill);
        boss.lastSkillAt = now;
      }
      break;
    }
    case 'jumping': {
      const t = (now - boss.jumpStart) / 400;
      if (t >= 1) {
        boss.ai = 'shadow';
        boss.shadowStart = now;
        const count = boss.shadowCount || 1;
        boss.shadows = [];
        // 第一發鎖定玩家當下位置；其餘散落地圖（讓玩家有跑位空間）
        for (let i = 0; i < count; i++) {
          let sx, sy;
          if (i === 0) {
            sx = player.x;
            sy = player.y;
          } else {
            sx = 140 + Math.random() * (W - 280);
            sy = 140 + Math.random() * (H - 280);
          }
          boss.shadows.push({
            x: clamp(sx, 80, W - 80),
            y: clamp(sy, 80, H - 80),
            r: 130,
            fallAt: now + 2000 + i * 550,
            fell: false,
          });
        }
      } else {
        // 跳躍動畫：快速飛到螢幕上方外（ease-in 加速）
        const easedT = t * t;
        boss.y = boss.jumpStartY - easedT * (boss.jumpStartY + 400);
      }
      break;
    }
    case 'shadow': {
      if (!boss.shadows || !boss.shadows.length) { boss.ai = 'chase'; break; }
      for (const sh of boss.shadows) {
        if (!sh.fell && now >= sh.fallAt) {
          const d = Math.hypot(player.x - sh.x, player.y - sh.y);
          if (d < sh.r && now > player.iframeUntil) {
            hurtPlayer(3, now);
            spawnHitFx(player.x, player.y);
          }
          triggerShake(14, 400);
          spawnParticles(sh.x, sh.y, 40, '#ffcc33');
          playSfx('explode', 0.85);
          sh.fell = true;
          sh.fellAt = now;
        }
      }
      if (boss.shadows.every(sh => sh.fell)) {
        const last = boss.shadows[boss.shadows.length - 1];
        if (now - last.fellAt > 200) {
          boss.x = last.x; boss.y = last.y;
          boss.shadows = [];
          boss.ai = 'chase';
          boss.lastSkillAt = now;
        }
      }
      break;
    }
    case 'falling': {
      // 保留此 case 以免殘留狀態（jumping/shadow 已取代）
      boss.ai = 'chase';
      break;
    }
    case 'dashWarn': {
      if (now > boss.dashWarnUntil) {
        boss.ai = 'dashing';
        boss.dashExecStart = now;
      }
      break;
    }
    case 'dashing': {
      const t = (now - boss.dashExecStart) / 420;
      if (t >= 1) {
        boss.ai = 'chase';
        boss.lastSkillAt = now;
      } else {
        // 衝刺位置 clamp 在畫面內（避免 boss 飛出螢幕消失）
        boss.x = clamp(boss.dashFromX + (boss.dashEndX - boss.dashFromX) * t, 100, W - 100);
        boss.y = clamp(boss.dashFromY + (boss.dashEndY - boss.dashFromY) * t, 100, H - 100);
        // 衝刺軌跡拖尾：每 55ms 在 boss 當前位置 spawn 一個 hit 特效（快速斬視覺）
        if (!boss.lastDashFxAt || now - boss.lastDashFxAt > 55) {
          spawnHitFx(boss.x + (Math.random()-0.5)*40, boss.y + (Math.random()-0.5)*40);
          boss.lastDashFxAt = now;
        }
        const d = Math.hypot(player.x - boss.x, player.y - boss.y);
        if (d < boss.r + player.r && now > player.iframeUntil) {
          hurtPlayer(2, now);
          // 命中玩家時 spawn 兩個更大的 hit fx（連環快速斬）
          spawnHitFx(player.x, player.y);
          spawnHitFx(player.x + 30, player.y - 20);
          triggerShake(8, 200);
        }
      }
      break;
    }
    case 'summoning': {
      const alive = enemies.some(e => boss.summonIds && boss.summonIds.includes(e.id));
      if (!alive || now - boss.summonStart > 20000) {
        boss.ai = 'chase';
        boss.lastSkillAt = now;
      }
      break;
    }
  }
}

function beginBossSkill(now, skill) {
  if (skill === 'mixed') {
    // L5 依序輪流使用前四關 BOSS 招式（不 random）
    const pool = ['jump', 'dash', 'summon', 'tripleJump'];
    const idx = boss.mixedIndex || 0;
    skill = pool[idx % pool.length];
    boss.mixedIndex = idx + 1;
  }
  if (skill === 'jump') {
    boss.ai = 'jumping';
    boss.jumpStart = now;
    boss.jumpStartY = boss.y;
    boss.shadowCount = 1;
  } else if (skill === 'tripleJump') {
    boss.ai = 'jumping';
    boss.jumpStart = now;
    boss.jumpStartY = boss.y;
    boss.shadowCount = 3;
  } else if (skill === 'dash') {
    beginDash(now);
  } else if (skill === 'summon') {
    beginSummon(now);
  }
}

function beginDash(now) {
  // 先把 boss 瞬移到玩家反方向邊緣附近
  const dx = boss.x - player.x, dy = boss.y - player.y;
  const d = Math.hypot(dx, dy) || 1;
  boss.x = clamp(player.x + (dx/d) * 650, 80, W - 80);
  boss.y = clamp(player.y + (dy/d) * 650, 80, H - 80);
  // 記錄衝刺線：boss → 玩家當下位置，延伸到畫面另一端
  const tdx = player.x - boss.x, tdy = player.y - boss.y;
  const td = Math.hypot(tdx, tdy) || 1;
  boss.dashFromX = boss.x;
  boss.dashFromY = boss.y;
  boss.dashEndX = boss.x + (tdx/td) * 2200;
  boss.dashEndY = boss.y + (tdy/td) * 2200;
  boss.dashStart = now;
  boss.dashWarnUntil = now + 1500;
  boss.ai = 'dashWarn';
}

function beginSummon(now) {
  boss.ai = 'summoning';
  boss.summonStart = now;
  boss.summonIds = [];
  const cfg = LV[currentLevel];
  const img = imgs[cfg.enemyImg];
  for (let i = 0; i < 3; i++) {
    const angle = (Math.PI * 2 / 3) * i + Math.random() * 0.4;
    const dist = 280;
    const ex = clamp(player.x + Math.cos(angle) * dist, 60, W - 60);
    const ey = clamp(player.y + Math.sin(angle) * dist, 80, H - 60);
    const e = {
      id: ++entityId, x: ex, y: ey,
      hp: Math.ceil(cfg.enemyHp * 2.5),
      speed: cfg.enemySpeed * 1.15,
      r: 38, img, w: 84, h: 84,
      dmg: Math.ceil(cfg.enemyDmg * 1.5),
      hitFlash: 0, isElite: true, xpDrop: 3,
      summonedBy: boss.id,
    };
    enemies.push(e);
    boss.summonIds.push(e.id);
  }
}

function drawShadows() {
  if (!boss || !boss.shadows || !boss.shadows.length) return;
  const now = performance.now();
  for (const sh of boss.shadows) {
    const remain = sh.fallAt - now;
    const total = 2000;
    const t = Math.max(0, Math.min(1, 1 - remain / total));   // 0 → 1
    ctx.save();
    // 黑影主體
    ctx.fillStyle = `rgba(0, 0, 0, ${0.42 + t * 0.22})`;
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, sh.r, 0, Math.PI * 2);
    ctx.fill();
    // 外圈紅色警告圈（越接近落地越大）
    ctx.strokeStyle = `rgba(255, 40, 40, ${0.7 + Math.sin(now/80)*0.3})`;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, sh.r * (1 + (1 - t) * 0.25), 0, Math.PI * 2);
    ctx.stroke();
    // 倒數圓弧
    ctx.strokeStyle = '#ff3030';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, sh.r - 12, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * (1 - t));
    ctx.stroke();
    // 中央「!」
    ctx.fillStyle = '#ff2030';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4;
    ctx.font = 'bold 82px "Microsoft JhengHei"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('!', sh.x, sh.y);
    ctx.fillText('!', sh.x, sh.y);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }
}

// 螢幕震動
let shakeAmount = 0;
let shakeUntil = 0;
function triggerShake(amt, dur) {
  shakeAmount = amt;
  shakeUntil = performance.now() + dur;
}

function drawEnemy(e) {
  // e.img 對精英已是預渲染的變色 canvas，不用 ctx.filter（快 10x）
  const img = e.img;
  if (!img) return;
  // Prerendered canvas 用 .width/.height，HTMLImageElement 用 .naturalWidth/.naturalHeight
  const imgW = img.naturalWidth || img.width;
  if (!imgW) return;
  ctx.save();
  if (e.hitFlash > 0) {
    ctx.shadowColor = '#ff4040';
    ctx.shadowBlur = 18;   // 從 28 降
  } else if (e.isElite && e.eliteType) {
    ctx.shadowColor = e.eliteType.shadow;
    ctx.shadowBlur = 12;   // 從 22 降
  }
  ctx.drawImage(img, e.x - e.w/2, e.y - e.h/2, e.w, e.h);
  ctx.restore();
}

// ============================================================================
// Projectiles (player slash + minion bb)
// ============================================================================
function nearestEnemy() {
  let best = null, bestD = Infinity;
  const all = allTargets();
  for (const e of all) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < bestD && d < player.slashRange) { bestD = d; best = e; }
  }
  return best;
}

function performSlash(now) {
  const R = player.slashRange;
  const all = allTargets();
  let anyHit = false;
  const critRate = player.critRate || 0;
  for (const e of all) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < R + e.r) {
      const crit = Math.random() < critRate;
      const dmg = crit ? player.slashDamage * 2 : player.slashDamage;
      e.hp -= dmg;
      e.hitFlash = crit ? 220 : 160;
      spawnParticles(e.x, e.y, crit ? 10 : 6, crit ? '#ffd84d' : '#ffe8c8');
      spawnDamageLabel(e.x + (Math.random()-0.5)*18, e.y - e.r - 6, dmg, crit ? '#ffd84d' : '#ffffff', crit);
      if (crit) critLabels.push({ x: e.x, y: e.y - 20, start: now });
      // 每個被打到的敵人身上各加一個白弧斬擊特效
      const aimAngle = Math.atan2(e.y - player.y, e.x - player.x);
      slashHits.push({
        x: e.x, y: e.y,
        angle: aimAngle + (Math.random() - 0.5) * 0.6,
        start: now,
        size: Math.max(55, Math.min(110, e.r * 2.2)),
      });
      if (e.hp <= 0 && e !== boss) onEnemyKill(e);
      anyHit = true;
    }
  }
  playSfx('cut', anyHit ? 0.8 : 0.35);
}

function spawnDamageLabel(x, y, amount, color, isBig) {
  damageLabels.push({
    x, y,
    text: String(Math.round(amount)),
    color: color || '#ffffff',
    start: performance.now(),
    isBig: !!isBig,
    vx: (Math.random() - 0.5) * 50,
  });
}

function drawDamageLabels() {
  const now = performance.now();
  const DUR = 650;
  if (damageLabels.length === 0) return;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const d of damageLabels) {
    const t = (now - d.start) / DUR;
    if (t >= 1) continue;
    const y = d.y - t * 48;
    const x = d.x + d.vx * t;
    const alpha = t < 0.65 ? 1 : Math.max(0, 1 - (t - 0.65) / 0.35);
    const baseSize = d.isBig ? 36 : 24;
    const scale = d.isBig ? (0.8 + t * 0.45) : (0.9 + t * 0.3);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.lineWidth = d.isBig ? 5 : 4;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = d.color;
    ctx.font = `bold ${baseSize}px "Microsoft JhengHei"`;
    ctx.strokeText(d.text, 0, 0);
    ctx.fillText(d.text, 0, 0);
    ctx.restore();
  }
  damageLabels = damageLabels.filter(d => (now - d.start) < DUR);
  ctx.textBaseline = 'alphabetic';
}

function drawCritLabels() {
  const now = performance.now();
  const DUR = 650;
  if (critLabels.length === 0) return;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const c of critLabels) {
    const t = (now - c.start) / DUR;
    if (t >= 1) continue;
    const y = c.y - 20 - t * 55;          // 向上飛
    const alpha = t < 0.65 ? 1 : Math.max(0, 1 - (t - 0.65) / 0.35);
    const scale = 0.85 + t * 0.6;
    const wobble = Math.sin(t * Math.PI * 4) * 3;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(c.x + wobble, y);
    ctx.scale(scale, scale);
    ctx.strokeStyle = '#8b0000';
    ctx.lineWidth = 7;
    ctx.fillStyle = '#ffd84d';
    ctx.font = 'bold 38px "Microsoft JhengHei"';
    ctx.strokeText('暴擊!', 0, 0);
    ctx.fillText('暴擊!', 0, 0);
    ctx.restore();
  }
  ctx.textBaseline = 'alphabetic';
  critLabels = critLabels.filter(c => (now - c.start) < DUR);
}

function drawSlashHits() {
  const now = performance.now();
  const DUR = 300;
  for (const h of slashHits) {
    const t = (now - h.start) / DUR;
    if (t >= 1) continue;
    const alpha = t < 0.5 ? 1 : Math.max(0, 1 - (t - 0.5) / 0.5);
    const R = h.size * (0.85 + t * 0.45);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(h.x, h.y);
    ctx.rotate(h.angle);
    ctx.lineCap = 'round';
    const cx = -R, cy = 0;
    // 2 層繪製（外 glow + 內白）— 原本 3 層太吃效能
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 14;   // 從 22 降
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 16;
    ctx.beginPath();
    ctx.arc(cx, cy, R, -Math.PI*0.7, Math.PI*0.7);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx, cy, R, -Math.PI*0.7, Math.PI*0.7);
    ctx.stroke();
    ctx.restore();
  }
  slashHits = slashHits.filter(h => (now - h.start) < DUR);
}

function updateProjectiles(dt) {
  const now = performance.now();
  const all = allTargets();
  for (const p of projectiles) {
    p.x += p.vx * dt/1000;
    p.y += p.vy * dt/1000;
    p.life -= dt;
    if (p.hostile) {
      // 敵人發射、打玩家
      const d = Math.hypot(player.x - p.x, player.y - p.y);
      if (d < player.r + p.r && now > player.iframeUntil) {
        hurtPlayer(p.dmg || 1, now);
        spawnParticles(p.x, p.y, 8, p.color || '#c060ff');
        p.life = 0;
      }
      continue;
    }
    // 玩家陣營：打敵人
    for (const e of all) {
      if (p.hitIds.has(e.id)) continue;
      const d = Math.hypot(e.x - p.x, e.y - p.y);
      if (d < e.r + p.r) {
        e.hp -= p.dmg;
        e.hitFlash = 160;
        p.hitIds.add(e.id);
        spawnParticles(p.x, p.y, 4, '#fffacd');
        spawnDamageLabel(e.x + (Math.random()-0.5)*16, e.y - e.r - 4, p.dmg, '#ffe8a0', false);
        if (p.pierce <= 0) { p.life = 0; break; }
        p.pierce--;
        if (e.hp <= 0 && e !== boss) onEnemyKill(e);
      }
    }
  }
  projectiles = projectiles.filter(p =>
    p.life > 0 && p.x > -120 && p.x < W + 120 && p.y > -120 && p.y < H + 120);
}

// drawSlashVisual 已移除 — 改用 drawSlashHits 畫在被打到的敵人身上

// 剪刀原圖刀尖方向（經 PIL 測量：centroid→tip 角度 ≈ 145° = 2.535 rad）
const SCISSOR_TIP_OFFSET = 2.535;

function drawProjectile(p) {
  if (p.hostile) {
    // 敵方紫色魔彈
    const now = performance.now();
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.shadowColor = p.color || '#c060ff';
    ctx.shadowBlur = 16;
    ctx.fillStyle = p.color || '#c060ff';
    ctx.beginPath();
    ctx.arc(0, 0, p.r || 14, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(0, 0, (p.r || 14) * 0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    return;
  }
  const isKid = p.source === 'kid';
  if (isKid) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle || 0);
    // 精簡為 1 層 shadow（原 4 層過度 overdraw）
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 18;
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath();
    ctx.ellipse(-10, 0, 52, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;   // 剪刀不用 blur
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, 0, 30, 4, 0, 0, Math.PI*2);
    ctx.fill();
    const img = imgs.scissor;
    if (img && img.complete && img.naturalWidth) {
      const size = 72;
      ctx.rotate(-SCISSOR_TIP_OFFSET);
      ctx.drawImage(img, -size/2, -size/2, size, size);
    }
    ctx.restore();
  } else {
    const img = imgs.boom;
    const size = 58;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(performance.now() / 180 + (p.angle || 0));
    ctx.shadowColor = '#ffb04a';
    ctx.shadowBlur = 12;   // 從 18 降
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, -size/2, -size/2, size, size);
    }
    ctx.restore();
  }
}

// ============================================================================
// Pickups: xp, heart, canister
// ============================================================================
function dropXp(x, y, amount = 1) {
  pickups.push({ type:'xp', x, y, amount, r:10,
    vx:(Math.random()-0.5)*120, vy:(Math.random()-0.5)*120 });
}
function dropHeart(x, y)  { pickups.push({ type:'heart',  x, y, r:22, vx:0, vy:0 }); }
function dropCan(x, y)    { pickups.push({ type:'can',    x, y, r:24, vx:0, vy:0 }); }
function dropMagnet(x, y) { pickups.push({ type:'magnet', x, y, r:26, vx:0, vy:0 }); }
function dropChest(x, y)  { pickups.push({ type:'chest',  x, y, r:32, vx:0, vy:0 }); }

function updatePickups(dt) {
  const MAGNET = 110;
  for (const p of pickups) {
    if (p.type === 'xp') {
      const dx = player.x - p.x, dy = player.y - p.y;
      const d = Math.hypot(dx, dy);
      if (p.magnetized) {
        // 強磁吸：全畫面拉向玩家
        const f = 2400;
        p.vx += (dx/(d||1)) * f * dt/1000;
        p.vy += (dy/(d||1)) * f * dt/1000;
      } else if (d < MAGNET) {
        const f = 900 * (1 - d/MAGNET);
        p.vx += (dx/(d||1)) * f * dt/1000;
        p.vy += (dy/(d||1)) * f * dt/1000;
      }
    }
    p.x += p.vx * dt/1000;
    p.y += p.vy * dt/1000;
    p.vx *= (p.magnetized ? 0.98 : 0.92);
    p.vy *= (p.magnetized ? 0.98 : 0.92);
    const d = Math.hypot(p.x - player.x, p.y - player.y);
    if (d < player.r + p.r) { onPickup(p); p.picked = true; }
  }
  pickups = pickups.filter(p => !p.picked);
}

function onPickup(p) {
  if (p.type === 'xp') {
    player.xp += p.amount;
    spawnParticles(player.x, player.y, 4, '#6af');
    playSfx('coin', 0.5);
  } else if (p.type === 'heart') {
    if (player.hp < player.maxHp) {
      player.hp++;
      playSfx('heal');
      spawnHeartGain();
    }
    // Always play the drink animation — even when maxed, the pickup is visible
    player.animUntil = performance.now() + 650;
    player.animType = 'drink';
  } else if (p.type === 'can') {
    if (player.canisters < player.maxCanisters) {
      player.canisters++;
      playSfx('heal', 0.6);
      spawnParticles(player.x, player.y, 14, '#0cf');
    }
    player.animUntil = performance.now() + 650;
    player.animType = 'smoke';
  } else if (p.type === 'magnet') {
    for (const pp of pickups) {
      if (pp.type === 'xp' && !pp.picked) pp.magnetized = true;
    }
    playSfx('magnet', 1.0);
    spawnParticles(player.x, player.y, 30, '#3cf');
  } else if (p.type === 'chest') {
    openChest();
  }
}

function openChest() {
  const picks = pickPassiveChoices(3);
  if (picks.length === 0) {
    // 被動全 max — 補血 + 送奧義罐代替
    player.hp = Math.min(player.maxHp, player.hp + 2);
    if (player.canisters < player.maxCanisters) player.canisters++;
    spawnParticles(player.x, player.y, 24, '#ff6a7a');
    spawnHeartGain();
    playSfx('heal', 1.0);
    return;
  }
  state = 'passivePick';
  passivePicks = picks;
  if (bgm) bgm.volume = 0.1;
  playSfx('lvup', 0.85);
  spawnParticles(player.x, player.y, 30, '#ffd84d');
}

function pickPassiveChoices(n) {
  const bucket = [];
  for (const k in PASSIVES) {
    const have = (player.passives && player.passives[k]) || 0;
    if (have < PASSIVES[k].max) bucket.push(k);
  }
  const picked = [];
  while (picked.length < n && bucket.length > 0) {
    const idx = Math.floor(Math.random() * bucket.length);
    picked.push(bucket[idx]);
    bucket.splice(idx, 1);
  }
  return picked;
}

function choosePassive(k) {
  if (!k) return;
  PASSIVES[k].apply();
  if (!player.passives) player.passives = {};
  player.passives[k] = (player.passives[k] || 0) + 1;
  spawnParticles(player.x, player.y, 25, '#3cf');
  state = 'play';
  if (bgm) bgm.volume = 0.3;
}

function drawPickup(p) {
  if (p.type === 'xp') {
    ctx.save();
    ctx.shadowColor = '#4af'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#4df';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  } else if (p.type === 'heart' && imgs.heart.complete) {
    const pulse = Math.sin(performance.now()/180) * 0.08 + 1;
    const s = 46 * pulse;
    ctx.save();
    ctx.shadowColor = '#f66'; ctx.shadowBlur = 18;
    ctx.drawImage(imgs.heart, p.x - s/2, p.y - s/2, s, s);
    ctx.restore();
  } else if (p.type === 'can' && imgs.can.complete) {
    const pulse = Math.sin(performance.now()/180) * 0.08 + 1;
    const s = 56 * pulse;
    ctx.save();
    ctx.shadowColor = '#0cf'; ctx.shadowBlur = 18;
    ctx.drawImage(imgs.can, p.x - s/2, p.y - s/2, s, s);
    ctx.restore();
  } else if (p.type === 'magnet') {
    const now = performance.now();
    const pulse = Math.sin(now/160) * 0.1 + 1;
    const s = 60 * pulse;
    ctx.save();
    ctx.shadowColor = '#ff2b2b'; ctx.shadowBlur = 22;
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.sin(now/400) * 0.08);
    // U 形磁鐵主體
    ctx.fillStyle = '#e22b2b';
    ctx.beginPath();
    ctx.arc(0, 0, s/2, Math.PI, 0, false);
    ctx.lineTo(s/2, s/3);
    ctx.lineTo(s/2 - s*0.22, s/3);
    ctx.lineTo(s/2 - s*0.22, 0);
    ctx.arc(0, 0, s/2 - s*0.22, 0, Math.PI, true);
    ctx.lineTo(-s/2 + s*0.22, s/3);
    ctx.lineTo(-s/2, s/3);
    ctx.closePath();
    ctx.fill();
    // 兩端白色極
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(-s/2, s/3, s*0.22, s*0.16);
    ctx.fillRect(s/2 - s*0.22, s/3, s*0.22, s*0.16);
    // N / S 標籤
    ctx.fillStyle = '#222';
    ctx.font = `bold ${Math.floor(s*0.18)}px "Arial Black", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', -s/2 + s*0.11, s/3 + s*0.08);
    ctx.fillText('S',  s/2 - s*0.11, s/3 + s*0.08);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  } else if (p.type === 'chest') {
    const now = performance.now();
    const pulse = Math.sin(now / 180) * 0.1 + 1;
    const s = 68 * pulse;
    ctx.save();
    ctx.shadowColor = '#ffd84d'; ctx.shadowBlur = 26;
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.sin(now / 400) * 0.06);
    // 箱身（棕色）
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-s/2, -s*0.22, s, s*0.55);
    // 箱蓋
    ctx.fillStyle = '#6B3410';
    ctx.fillRect(-s/2, -s*0.35, s, s*0.15);
    // 金邊
    ctx.strokeStyle = '#ffd84d';
    ctx.lineWidth = 4;
    ctx.strokeRect(-s/2, -s*0.35, s, s*0.68);
    ctx.strokeStyle = '#ffd84d';
    ctx.beginPath();
    ctx.moveTo(-s/2, -s*0.2); ctx.lineTo(s/2, -s*0.2);
    ctx.stroke();
    // 中央鎖 + ★
    ctx.fillStyle = '#ffd84d';
    ctx.fillRect(-s*0.12, -s*0.18, s*0.24, s*0.2);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.floor(s*0.24)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', 0, -s*0.08);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }
}

// ============================================================================
// Particles
// ============================================================================
const MAX_PARTICLES = 150;
function spawnParticles(x, y, n, color) {
  const room = MAX_PARTICLES - particles.length;
  if (room <= 0) return;
  const cap = Math.min(n, room);
  for (let i = 0; i < cap; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 60 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(a)*v, vy: Math.sin(a)*v,
      color, r: 2 + Math.random() * 3,
      life: 400 + Math.random() * 200,
      born: performance.now(), gravity: 200,
    });
  }
}

function spawnHeartGain() {
  const room = MAX_PARTICLES - particles.length;
  const n = Math.min(12, room);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({
      x: player.x + Math.cos(a)*16, y: player.y + Math.sin(a)*16,
      vx: Math.cos(a)*30, vy: -80 - Math.random()*70,
      color: '#ff4e6a', r: 4 + Math.random()*3,
      life: 700, born: performance.now(), gravity: -60,
    });
  }
}

function spawnHeartLose() {
  const room = MAX_PARTICLES - particles.length;
  const n = Math.min(20, room);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 110 + Math.random() * 200;
    particles.push({
      x: player.x, y: player.y - 20,
      vx: Math.cos(a)*v, vy: Math.sin(a)*v - 100,
      color: '#c81835', r: 3 + Math.random()*4,
      life: 600, born: performance.now(), gravity: 300,
    });
  }
}

function updateParticles(dt) {
  const now = performance.now();
  for (const p of particles) {
    p.x += p.vx * dt/1000;
    p.y += p.vy * dt/1000;
    p.vy += (p.gravity || 200) * dt/1000;
    p.vx *= 0.98;
  }
  particles = particles.filter(p => now - p.born < p.life);
}

function drawParticles() {
  const now = performance.now();
  for (const p of particles) {
    const t = (now - p.born) / p.life;
    ctx.globalAlpha = Math.max(0, 1 - t);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================================
// Minions
// ============================================================================
function updateMinions(dt, now) {
  // BB (波貝貝) — 繞體盾，碰到敵人把他們彈開 + 輕傷
  if (player.skills.bb) {
    minionState.bbAngle = (minionState.bbAngle || 0) + dt * 0.0038;
    const r = player.bbOrbR || 110;
    const bx = player.x + Math.cos(minionState.bbAngle) * r;
    const by = player.y + Math.sin(minionState.bbAngle) * r;
    minionState.bbX = bx;
    minionState.bbY = by;
    const BB_HIT_R = (player.bbSize || 80) * 0.6;
    minionState.bbCooldown -= dt;
    const all = allTargets();
    for (const e of all) {
      const dx = e.x - bx, dy = e.y - by;
      const d = Math.hypot(dx, dy) || 1;
      const touch = BB_HIT_R + e.r;
      if (d < touch) {
        const nx = dx / d, ny = dy / d;
        const push = (touch - d) + 20;
        // BOSS 不被彈開；小怪 / 精英全推
        if (e !== boss) {
          e.x += nx * push;
          e.y += ny * push;
        }
        // 連續傷害：同一敵人 350ms 一次；BOSS 傷害×3 讓累積有感
        e.bbHitUntil = e.bbHitUntil || 0;
        if (now >= e.bbHitUntil) {
          const bbDmg = e === boss ? 3 : 1;
          e.hp -= bbDmg;
          e.hitFlash = 140;
          e.bbHitUntil = now + 350;
          spawnParticles(bx, by, 4, '#ffb0b0');
          spawnDamageLabel(e.x + (Math.random()-0.5)*16, e.y - e.r - 4, bbDmg, '#ffc0c0', false);
          if (e.hp <= 0 && e !== boss) onEnemyKill(e);
        }
      }
    }
  }

  // KID (親親子) — 貼身跟隨 + 自動向最近敵人射靈氣
  if (player.skills.kid) {
    minionState.kidFloat = (minionState.kidFloat || 0) + dt * 0.004;
    const offsetX = 60 * (player.facing >= 0 ? -1 : 1);
    const offsetY = -20;
    const fx = Math.sin(minionState.kidFloat) * 5;
    const fy = Math.cos(minionState.kidFloat * 0.7) * 6;
    minionState.kidX = player.x + offsetX + fx;
    minionState.kidY = player.y + offsetY + fy;
    // 射擊 cooldown — 親親子鎖定全場最近敵人（不受玩家 slashRange 限制）
    minionState.kidShootCooldown = (minionState.kidShootCooldown || 0) - dt;
    if (minionState.kidShootCooldown <= 0) {
      let t = null, bestD = Infinity;
      for (const e of allTargets()) {
        const d = Math.hypot(e.x - minionState.kidX, e.y - minionState.kidY);
        if (d < bestD) { bestD = d; t = e; }
      }
      if (t) {
        const dx = t.x - minionState.kidX;
        const dy = t.y - minionState.kidY;
        const d = Math.hypot(dx, dy) || 1;
        const nx = dx / d, ny = dy / d;
        // 垂直於飛行方向（順時針 90°）當作並排偏移軸
        const px = -ny, py = nx;
        const SPACING = 38;
        const speed = 620 * (player.projSpeedMul || 1);
        const count = Math.max(1, Math.min(3, player.skills.kid || 1));
        const angle = Math.atan2(dy, dx);
        for (let i = 0; i < count; i++) {
          // count=1 → [0]; count=2 → [-0.5, 0.5]; count=3 → [-1, 0, 1]
          const offset = (i - (count - 1) / 2) * SPACING;
          projectiles.push({
            x: minionState.kidX + px * offset,
            y: minionState.kidY + py * offset,
            vx: nx * speed, vy: ny * speed,
            life: 2400,
            dmg: player.kidShootDamage || 3,
            pierce: 99, r: 18,
            source: 'kid', hitIds: new Set(),
            angle, color: '#ffffff',
          });
        }
        minionState.kidShootCooldown = player.kidShootInterval || 1500;
        playSfx('shoot', 0.45);
      }
    }
  }
}

const bbEl  = () => document.getElementById('mn-bb');
const kidEl = () => document.getElementById('mn-kid');
const pigHudEl = () => document.getElementById('pig-hud');
const BB_SIZE = 80, KID_SIZE = 80;

function syncMinions(now) {
  const ultChaining = (state === 'ult' && (ultPhase === 'chain' || ultPhase === 'finale'));
  const onStage = !ultChaining && (state === 'play' || state === 'levelup' || state === 'ult' || state === 'dying');

  // BB (波貝貝) — 繞體盾（升級變大）
  const bb = bbEl();
  if (onStage && player.skills.bb) {
    const x = minionState.bbX ?? player.x;
    const y = minionState.bbY ?? player.y;
    const size = player.bbSize || BB_SIZE;
    bb.style.display = 'block';
    bb.style.width = size + 'px';
    bb.style.height = size + 'px';
    bb.style.transform = `translate(${x - size/2}px, ${y - size/2}px)`;
  } else {
    bb.style.display = 'none';
  }

  // KID (親親子) — 貼身跟隨
  const kid = kidEl();
  if (onStage && player.skills.kid) {
    const x = minionState.kidX ?? player.x;
    const y = minionState.kidY ?? player.y;
    kid.style.display = 'block';
    kid.style.width = KID_SIZE + 'px';
    kid.style.height = KID_SIZE + 'px';
    kid.style.transform = `translate(${x - KID_SIZE/2}px, ${y - KID_SIZE/2}px)`;
  } else {
    kid.style.display = 'none';
  }

  // Pig HUD — N charges as GIFs top-left
  const pigHud = pigHudEl();
  if (onStage && player.pigCharges > 0) {
    const want = player.pigCharges;
    while (pigHud.children.length < want) {
      const img = document.createElement('img');
      img.src = 'a/minion/pig.gif';
      pigHud.appendChild(img);
    }
    while (pigHud.children.length > want) pigHud.removeChild(pigHud.lastChild);
    pigHud.style.display = 'flex';
  } else {
    pigHud.style.display = 'none';
  }
}

// ============================================================================
// Spawner
// ============================================================================
function updateSpawner(dt, now) {
  const cfg = LV[currentLevel];
  if (!bossSpawned && elapsed >= cfg.bossTime) {
    spawnEnemy(true);
  }
  if (!bossSpawned) {
    let wave = null;
    for (const w of cfg.spawnCfg) {
      if (elapsed >= w.from && elapsed < w.to) { wave = w; break; }
    }
    if (wave && now - lastSpawn > wave.interval) {
      lastSpawn = now;
      // 場上敵人數量上限，防 LAG。BOSS 不算在內。
      const MAX_ON_SCREEN = 35;
      for (let i = 0; i < wave.count; i++) {
        if (enemies.length >= MAX_ON_SCREEN) break;
        spawnEnemy();
      }
    }
  }
  if (now - lastPickupSpawn > 22000) {
    lastPickupSpawn = now;
    const type = Math.random() < 0.55 ? 'heart' : 'can';
    pickups.push({
      type, r: type === 'heart' ? 22 : 24,
      x: 100 + Math.random() * (W - 200),
      y: 120 + Math.random() * (H - 240),
      vx: 0, vy: 0,
    });
  }
}

// ============================================================================
// Combat events
// ============================================================================
function onEnemyKill(e) {
  killCount++;
  playSfx('die', 0.75);
  const r = Math.random();
  if (r < 0.04)      dropHeart(e.x, e.y);
  else if (r < 0.08) dropCan(e.x, e.y);
  else if (r < 0.11) dropMagnet(e.x, e.y);
  else if (r < 0.14) dropChest(e.x, e.y);
  else               dropXp(e.x, e.y, e.xpDrop || 1);
  spawnParticles(e.x, e.y, 8, '#ffee7a');
  // 紙片切半動畫
  deathAnims.push({
    x: e.x, y: e.y, w: e.w, h: e.h,
    img: e.img, isElite: e.isElite,
    start: performance.now(),
  });
}

function drawDeathAnims() {
  const now = performance.now();
  const DUR = 700;
  for (const a of deathAnims) {
    const t = (now - a.start) / DUR;
    if (t >= 1) continue;
    const alpha = 1 - t;
    const img = a.img;
    if (!img) continue;
    const nw = img.naturalWidth || img.width;
    const nh = img.naturalHeight || img.height;
    if (!nw) continue;
    const halfH = Math.floor(nh / 2);
    const eased = t * (2 - t);
    ctx.save();
    // 不用 ctx.filter — 精英的 img 已是預渲染變色版
    ctx.globalAlpha = alpha;
    // 上半：向左上滑 + 逆時針微旋
    ctx.save();
    ctx.translate(a.x - eased * 12, a.y - eased * 26);
    ctx.rotate(-eased * 0.35);
    ctx.drawImage(img, 0, 0, nw, halfH,
                  -a.w/2, -a.h/2, a.w, a.h/2);
    ctx.restore();
    // 下半：向右下滑 + 順時針微旋
    ctx.save();
    ctx.translate(a.x + eased * 10, a.y + eased * 38);
    ctx.rotate(eased * 0.35);
    ctx.drawImage(img, 0, halfH, nw, nh - halfH,
                  -a.w/2, 0, a.w, a.h/2);
    ctx.restore();
    ctx.restore();
  }
  deathAnims = deathAnims.filter(a => (now - a.start) < DUR);
}

function spawnHitFx(x, y) {
  hitFx.push({ x, y, start: performance.now(), flip: Math.random() < 0.5 });
}

function drawHitFx() {
  const now = performance.now();
  const DUR = 320;
  const img = imgs.hit;
  if (!img || !img.naturalWidth) return;
  for (const f of hitFx) {
    const t = (now - f.start) / DUR;
    if (t >= 1) continue;
    const alpha = t < 0.4 ? 1 : 1 - (t - 0.4) / 0.6;
    const scale = 0.6 + t * 0.7;
    const w = 260 * scale;
    const h = w * (img.naturalHeight / img.naturalWidth);
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.translate(f.x, f.y);
    if (f.flip) ctx.scale(-1, 1);
    ctx.drawImage(img, -w/2, -h/2, w, h);
    ctx.restore();
  }
  hitFx = hitFx.filter(f => (now - f.start) < DUR);
}

function hurtPlayer(dmg, now) {
  if (state !== 'play') return;
  // armor 減傷（底線 1）
  dmg = Math.max(1, dmg - (player.armor || 0));
  // 豬鼻醬 save: any hit that would kill
  if (player.hp - dmg <= 0 && player.pigCharges > 0) {
    player.pigCharges--;
    player.hp = player.maxHp;
    player.iframeUntil = now + 1600;
    playSfx('heal');
    spawnParticles(player.x, player.y, 50, '#ffc0cb');
    spawnHeartGain();
    player.animUntil = now + 1100;
    player.animType = 'drink';
    return;
  }
  player.hp -= dmg;
  player.iframeUntil = now + 1200;   // 一次受傷後 1.2s 無敵，避免群體包圍瞬殺
  spawnHeartLose();
  playSfx('miss', 0.7);
  if (player.hp <= 0) { player.hp = 0; startDying(now); }
}

// ============================================================================
// Level up
// ============================================================================
function xpCurve(lv) {
  return Math.floor(3 + (lv - 1) * 2 + Math.pow(lv - 1, 1.5) * 1.5);
}

function triggerLevelUp() {
  const choices = pickWeightedChoices(3);
  if (choices.length === 0) {
    // 全技能都 max 了 — 補血代替
    const gain = 2;
    player.hp = Math.min(player.maxHp, player.hp + gain);
    spawnParticles(player.x, player.y, 20, '#ff6a7a');
    spawnHeartGain();
    playSfx('heal', 0.9);
    return;
  }
  state = 'levelup';
  levelUpChoices = choices;
  if (bgm) bgm.volume = 0.1;
  playSfx('lvup', 0.9);
}

function pickWeightedChoices(n) {
  // 依每個技能的 weight 建池（同 key 重複 weight 次），然後抽 n 個不重複 key
  const bucket = [];
  for (const k in SKILLS) {
    const have = player.skills[k] || 0;
    if (have < SKILLS[k].max) {
      const w = SKILLS[k].weight || 1;
      for (let i = 0; i < w; i++) bucket.push(k);
    }
  }
  const picked = [];
  const seen = new Set();
  while (picked.length < n && bucket.length > 0) {
    const idx = Math.floor(Math.random() * bucket.length);
    const k = bucket[idx];
    if (!seen.has(k)) {
      picked.push(k);
      seen.add(k);
    }
    for (let i = bucket.length - 1; i >= 0; i--) {
      if (bucket[i] === k) bucket.splice(i, 1);
    }
  }
  return picked;
}

function chooseSkill(k) {
  if (!k) return;
  SKILLS[k].apply();
  player.skills[k] = (player.skills[k] || 0) + 1;
  spawnParticles(player.x, player.y, 25, '#ffd84d');
  if (player.xp >= player.xpNeeded) {
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = xpCurve(player.level);
    triggerLevelUp();
  } else {
    state = 'play';
    if (bgm) bgm.volume = 0.3;
  }
}

// ============================================================================
// Ult — 新流程：intro (3.6s 眼神特寫) → chain (近→遠連鎖瞬斬) → finale (HITS 結算)
// ============================================================================
let ultPhase = null;      // 'intro' | 'chain' | 'finale'
let ultPhaseStart = 0;
let ultChain = [];        // [target ref] 貪心最近鄰排序後的目標序列
let ultHitIdx = 0;
let ultHitCount = 0;
let ultTrail = [];        // [{x,y}] 玩家折線軌跡
let ultPlayerX = 0;       // chain 期間玩家顯示位置
let ultPlayerY = 0;
let ultHitMs = 60;        // 每下耗時（動態：敵人越多越短）
let ultBossDmgDealt = 0;
const ULT_INTRO_MS = 3600;
const ULT_CHAIN_BUDGET_MS = 2600;   // chain 總時間預算
const ULT_CHAIN_HIT_MS_MIN = 30;
const ULT_CHAIN_HIT_MS_MAX = 90;
const ULT_FINALE_MS = 1400;

function tryUlt() {
  if (player.canisters <= 0) return;
  if (state !== 'play') return;
  player.canisters--;
  state = 'ult';
  ultStartTime = performance.now();
  ultPhase = 'intro';
  ultPhaseStart = ultStartTime;
  ultChain = [];
  ultHitIdx = 0;
  ultHitCount = 0;
  ultTrail = [];
  ultBossDmgDealt = 0;
  ultPlayerX = player.x;
  ultPlayerY = player.y;
  document.getElementById('ult-img').style.display = 'block';
  playSfx('ult', 1.0);
  if (bgm) bgm.volume = 0.05;
  console.log('[ULT] start, level=', currentLevel);
}

// 貪心最近鄰排序：從玩家位置出發，每次跳到最近未訪問的目標
function buildUltChain() {
  const pool = enemies.slice();
  if (boss && bossVulnerable()) pool.push(boss);
  const chain = [];
  let cx = player.x, cy = player.y;
  while (pool.length) {
    let bi = 0, bd = Infinity;
    for (let i = 0; i < pool.length; i++) {
      const d = Math.hypot(pool[i].x - cx, pool[i].y - cy);
      if (d < bd) { bd = d; bi = i; }
    }
    const next = pool.splice(bi, 1)[0];
    chain.push(next);
    cx = next.x; cy = next.y;
  }
  return chain;
}

// 每幀更新 ult phase（取代舊的 setTimeout chain）
function updateUltPhase(pnow) {
  if (!ultPhase) return;
  const pe = pnow - ultPhaseStart;
  if (ultPhase === 'intro') {
    if (pe >= ULT_INTRO_MS) {
      document.getElementById('ult-img').style.display = 'none';
      ultChain = buildUltChain();
      const n = Math.max(1, ultChain.length);
      ultHitMs = Math.max(ULT_CHAIN_HIT_MS_MIN,
                          Math.min(ULT_CHAIN_HIT_MS_MAX, Math.floor(ULT_CHAIN_BUDGET_MS / n)));
      ultHitIdx = 0;
      ultHitCount = 0;
      ultTrail = [{ x: player.x, y: player.y }];
      ultPlayerX = player.x; ultPlayerY = player.y;
      if (ultChain.length === 0) {
        // 場上沒敵人 → 直接進 finale
        ultPhase = 'finale';
      } else {
        ultPhase = 'chain';
      }
      ultPhaseStart = pnow;
    }
  } else if (ultPhase === 'chain') {
    const shouldIdx = Math.min(ultChain.length, Math.floor(pe / ultHitMs));
    while (ultHitIdx < shouldIdx) {
      const target = ultChain[ultHitIdx];
      if (target) doUltHit(target, pnow);
      ultHitIdx++;
    }
    if (ultHitIdx >= ultChain.length && pe >= ultChain.length * ultHitMs + 180) {
      // 最後一擊餘韻 180ms，轉 finale
      ultPhase = 'finale';
      ultPhaseStart = pnow;
    }
  } else if (ultPhase === 'finale') {
    if (pe >= ULT_FINALE_MS) finishUltScreen();
  }
}

function doUltHit(target, now) {
  ultPlayerX = target.x;
  ultPlayerY = target.y;
  ultTrail.push({ x: target.x, y: target.y });
  ultHitCount++;
  // 斬擊方向：從上一個點指向當前目標
  const prev = ultTrail[ultTrail.length - 2] || { x: target.x - 1, y: target.y };
  const aimAngle = Math.atan2(target.y - prev.y, target.x - prev.x);
  slashHits.push({
    x: target.x, y: target.y,
    angle: aimAngle + (Math.random() - 0.5) * 0.3,
    start: now,
    size: Math.max(70, Math.min(130, (target.r || 36) * 2.4)),
  });
  spawnParticles(target.x, target.y, 8, '#ffffff');
  spawnParticles(target.x, target.y, 5, '#ff5030');
  // 音效節流：每 3 下才播一次，避免爆音
  if (ultHitCount % 3 === 1) playSfx('cut', 0.5);
  if (target === boss) {
    if (ultBossDmgDealt < 1) {
      const dmg = Math.floor(boss.maxHp * 0.35);
      const actual = Math.min(boss.hp - 1, dmg);
      boss.hp = Math.max(1, boss.hp - dmg);
      boss.hitFlash = 300;
      ultBossDmgDealt++;
      spawnDamageLabel(boss.x, boss.y - 40, actual, '#ffd84d', true);
    } else {
      spawnDamageLabel(boss.x, boss.y - 40, 1, '#ffffff', false);
    }
  } else {
    const dmg = Math.max(1, target.hp);
    target.hp = 0;
    spawnDamageLabel(target.x, target.y - 20, dmg, '#ff6060', true);
    // 手動收屍（跳過 onEnemyKill，避免 die SFX × N + 50 個寶箱/愛心掉落爆音）
    killCount++;
    dropXp(target.x, target.y, 2);
    deathAnims.push({
      x: target.x, y: target.y, w: target.w, h: target.h,
      img: target.img, isElite: target.isElite, start: now,
    });
    const idx = enemies.indexOf(target);
    if (idx >= 0) enemies.splice(idx, 1);
  }
}

function drawUltEffect() {
  if (ultPhase === 'intro') return;  // intro 用 ult-img 蓋住
  if (ultPhase !== 'chain' && ultPhase !== 'finale') return;
  const now = performance.now();
  const pe = now - ultPhaseStart;

  // 時停灰底（覆蓋畫面）
  ctx.save();
  ctx.fillStyle = 'rgba(15, 18, 32, 0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // 紅色折線軌跡（外粗紅 + 內細白）
  if (ultTrail.length >= 2) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(255, 40, 60, 0.92)';
    ctx.lineWidth = 10;
    ctx.shadowColor = '#ff2030';
    ctx.shadowBlur = 22;
    ctx.beginPath();
    ctx.moveTo(ultTrail[0].x, ultTrail[0].y);
    for (let i = 1; i < ultTrail.length; i++) ctx.lineTo(ultTrail[i].x, ultTrail[i].y);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255, 230, 230, 0.98)';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.restore();
  }

  // 玩家殘影（最近幾個軌跡點，淡入淡出）
  const pimg = imgs.attack && imgs.attack.naturalWidth ? imgs.attack : imgs.walk1;
  if (pimg && pimg.naturalWidth) {
    const w = 130;
    const h = w * pimg.naturalHeight / pimg.naturalWidth;
    const n = ultTrail.length;
    ctx.save();
    for (let i = Math.max(0, n - 4); i < n - 1; i++) {
      const alpha = ((i - (n - 4)) / 4) * 0.45;
      if (alpha <= 0) continue;
      ctx.globalAlpha = alpha;
      const p = ultTrail[i];
      ctx.drawImage(pimg, p.x - w/2, p.y - h/2 - 8, w, h);
    }
    // 當前玩家位置（滿透明度）
    ctx.globalAlpha = 1;
    ctx.drawImage(pimg, ultPlayerX - w/2, ultPlayerY - h/2 - 8, w, h);
    ctx.restore();
  }

  // HITS 計數（chain 期間 HUD 右上）
  if (ultPhase === 'chain' && ultHitCount > 0) {
    ctx.save();
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.lineWidth = 5;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#ffd84d';
    ctx.shadowColor = '#ff6020';
    ctx.shadowBlur = 14;
    ctx.font = 'bold 64px "Microsoft JhengHei"';
    ctx.strokeText(`${ultHitCount} HITS`, W - 40, 140);
    ctx.fillText(`${ultHitCount} HITS`, W - 40, 140);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }

  // Finale 中央大字
  if (ultPhase === 'finale') {
    const t = pe / ULT_FINALE_MS;
    const ease = t < 0.35 ? (t / 0.35) : 1;
    const fade = t < 0.7 ? 1 : Math.max(0, 1 - (t - 0.7) / 0.3);
    const scale = 0.55 + ease * 0.7 + (1 - fade) * 0.3;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = fade;
    ctx.translate(W/2, H/2);
    ctx.scale(scale, scale);
    ctx.lineWidth = 14;
    ctx.strokeStyle = '#8b0000';
    ctx.fillStyle = '#ffe14a';
    ctx.shadowColor = '#ff5020';
    ctx.shadowBlur = 36;
    ctx.font = 'bold 180px "Microsoft JhengHei"';
    const text = `${ultHitCount} HITS`;
    ctx.strokeText(text, 0, 0);
    ctx.fillText(text, 0, 0);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }
}

function finishUltScreen() {
  // chain 已經處理掉大部分敵人，這裡保險收割殘餘（極端情況）
  for (const e of enemies.slice()) {
    dropXp(e.x, e.y, 2);
    killCount++;
  }
  enemies = [];
  ultPhase = null;
  ultStartTime = 0;
  ultChain = [];
  ultTrail = [];
  ultHitCount = 0;
  document.getElementById('ult-img').style.display = 'none';
  triggerShake(9, 320);
  last = performance.now();
  state = 'play';
  if (bgm) bgm.volume = 0.3;
}

// ============================================================================
// Dying / Dead / Victory
// ============================================================================
function startDying(now) {
  state = 'dying';
  dyingStart = now;
  redFade = 0;
  if (bgm) bgm.pause();
  playSfx('dead', 1.0);
}

function updateDying(dt, now) {
  const t = (now - dyingStart) / 1800;
  redFade = Math.min(1, t);
  if (t >= 1) state = 'dead';
}

function drawDyingOverlay() {
  if (redFade <= 0) return;
  if (redFade < 0.55) {
    ctx.fillStyle = `rgba(200, 20, 20, ${redFade * 1.1})`;
  } else {
    ctx.fillStyle = `rgba(0,0,0, ${(redFade - 0.45) * 1.8})`;
  }
  ctx.fillRect(0, 0, W, H);
}

function drawDead() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const r = imgs.rrrr;
  if (r && r.complete && r.naturalWidth) {
    const scale = Math.min(W*0.78 / r.naturalWidth, H*0.68 / r.naturalHeight);
    const w = r.naturalWidth * scale;
    const h = r.naturalHeight * scale;
    ctx.drawImage(r, (W-w)/2, (H-h)/2 - 30, w, h);
  }
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.font = 'bold 40px "Microsoft JhengHei"';
  ctx.textAlign = 'center';
  ctx.strokeText('按 SPACE 重新開始', W/2, H - 60);
  ctx.fillText('按 SPACE 重新開始', W/2, H - 60);
}

let transitionStart = 0;
let levelIntroStart = 0;
const LEVEL_INTRO_MS = 1200;
let finalVictoryPhase = null;    // 'wait' (1s) | 'congrats' (3s FINAL2) | 'outro' (影片)
let finalVictoryStart = 0;
const FINAL_WAIT_MS = 1000;
const FINAL_CONGRATS_MS = 3000;
const FINAL_FADE_MS = 700;       // congrats 淡入/淡出時間

function drawLevelIntro() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const img = imgs['intro' + currentLevel];
  if (img && img.complete && img.naturalWidth) {
    // 以 60% 畫面高為基準，保持比例置中
    const maxH = H * 0.6;
    const maxW = W * 0.55;
    const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
    const w = img.naturalWidth * scale;
    const h = img.naturalHeight * scale;
    ctx.drawImage(img, (W - w) / 2, (H - h) / 2 - 30, w, h);
  }
  // 標題
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd84d';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 9;
  ctx.font = 'bold 88px "Microsoft JhengHei"';
  ctx.strokeText(`LEVEL ${currentLevel}`, W / 2, 80);
  ctx.fillText(`LEVEL ${currentLevel}`, W / 2, 80);
  // 底部提示
  const t = (performance.now() - levelIntroStart) / LEVEL_INTRO_MS;
  ctx.globalAlpha = Math.min(1, t * 2);
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.lineWidth = 4;
  ctx.font = 'bold 30px "Microsoft JhengHei"';
  ctx.strokeText('準備戰鬥...', W / 2, H - 60);
  ctx.fillText('準備戰鬥...', W / 2, H - 60);
  ctx.globalAlpha = 1;
  ctx.textBaseline = 'alphabetic';
}

function enterLevelIntro() {
  state = 'levelIntro';
  levelIntroStart = performance.now();
  setTimeout(() => {
    if (state === 'levelIntro') state = 'play';
  }, LEVEL_INTRO_MS);
}

function victory() {
  // L2+ 倒地音效
  if (currentLevel >= 2) playSfx('vtdown', 0.9);
  if (currentLevel >= 5) {
    state = 'final_victory';
    finalVictoryPhase = 'wait';       // wait 1s → congrats 3s → outro video
    finalVictoryStart = performance.now();
    if (bgm) bgm.pause();
    spawnParticles(W/2, H/2, 120, '#ffd84d');
    playSfx('lvup', 1.0);
    // 影片先不播（等 congrats phase 結束才觸發）

    state = 'transition';
    transitionStart = performance.now();
    spawnParticles(W/2, H/2, 80, '#ffd84d');

}

function startNextLevel() {

  enemies = []; projectiles = []; pickups = []; particles = [];
  deathAnims = []; hitFx = []; slashHits = []; critLabels = []; damageLabels = [];
  boss = null; bossSpawned = false;

function drawTransition() {
  const now = performance.now();
  const t = Math.min(1, (now - transitionStart) / 1800);
  // 黑色 overlay 漸入
  ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.88, t * 1.5)})`;
  ctx.fillRect(0, 0, W, H);
  const alpha = Math.min(1, t * 2);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 大字
  const pulse = 1 + Math.sin((now - transitionStart) / 180) * 0.04;
  ctx.fillStyle = '#ffd84d';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 12;
  ctx.font = `bold ${Math.floor(150 * pulse)}px "Microsoft JhengHei"`;
  ctx.strokeText(`LEVEL ${currentLevel + 1}`, W/2, H/2 - 40);
  ctx.fillText(`LEVEL ${currentLevel + 1}`, W/2, H/2 - 40);

  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  ctx.lineWidth = 5;
  ctx.font = 'bold 38px "Microsoft JhengHei"';
  ctx.strokeText('新的敵手 正在逼近...', W/2, H/2 + 70);
  ctx.fillText('新的敵手 正在逼近...', W/2, H/2 + 70);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';

function drawFinalVictory() {
  const now = performance.now();
  const phaseT = now - finalVictoryStart;

  if (finalVictoryPhase === 'wait') {
    // 1 秒空等，讓戰鬥結束的瞬間多沉澱一下，不畫任何 overlay
    return;
  }

  if (finalVictoryPhase === 'congrats') {
    // 淡入 FINAL2.jpg（前 FINAL_FADE_MS 淡入，末尾 FINAL_FADE_MS 淡出讓銜接影片順）
    let alpha = 1;
    if (phaseT < FINAL_FADE_MS) {
      alpha = phaseT / FINAL_FADE_MS;
    } else if (phaseT > FINAL_CONGRATS_MS - FINAL_FADE_MS) {
      alpha = Math.max(0, (FINAL_CONGRATS_MS - phaseT) / FINAL_FADE_MS);
    }
    ctx.save();
    ctx.globalAlpha = alpha;
    // 黑底
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    // 通關大圖（維持比例，適配到畫面）
    const img = imgs.final2;
    if (img && img.complete && img.naturalWidth) {
      const scale = Math.min(W / img.naturalWidth, H / img.naturalHeight);
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
    }
    ctx.restore();
    return;
  }

  // outro 影片播放中：影片是 z-index 22 的 DOM 元素，canvas 不用畫東西
  const vid = document.getElementById('outro');
  const vidDone = !vid || vid.ended || (vid.duration && vid.currentTime >= vid.duration - 0.05);
  if (!vidDone) return;
  // 影片結束後，顯示「按 SPACE 回主選單」提示
  const hintPulse = 0.55 + 0.45 * Math.sin(now / 280);
  ctx.save();

// ============================================================================
// Level up modal
// ============================================================================
function wrapTextLines(text, maxWidth) {
  const lines = [];
  let cur = '';
  for (const ch of text) {
    const test = cur + ch;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur);
      cur = ch;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function fillWrapped(text, cxCenter, yTop, maxWidth, lineHeight) {
  const lines = wrapTextLines(text, maxWidth);
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], cxCenter, yTop + i * lineHeight);
  }
  return lines.length;
}

function drawPassivePick() {

  ctx.lineWidth = 5;

  ctx.strokeText('★ 寶箱開啟 ★', W/2, 110);
  ctx.fillText('★ 寶箱開啟 ★', W/2, 110);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px "Microsoft JhengHei"';
  ctx.fillText('選擇一項被動強化（點卡片 或 按 1/2/3）', W/2, 165);

  const cardW = 310, cardH = 330, gap = 40;
  const totalW = cardW * 3 + gap * 2;
  const startX = (W - totalW) / 2;
  const cy = 230;
  for (let i = 0; i < passivePicks.length; i++) {
    const k = passivePicks[i];
    const s = PASSIVES[k];
    const cx = startX + i * (cardW + gap);
    ctx.fillStyle = 'rgba(20, 40, 70, 0.95)';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = '#3cf';
    ctx.lineWidth = 4;
    ctx.strokeRect(cx, cy, cardW, cardH);
    ctx.fillStyle = '#3cf';
    ctx.font = 'bold 36px "Microsoft JhengHei"';
    ctx.fillText(s.name, cx + cardW/2, cy + 70);
    const have = (player.passives && player.passives[k]) || 0;
    ctx.fillStyle = '#aef';
    ctx.font = 'bold 22px "Microsoft JhengHei"';
    ctx.fillText(`等級 ${have}/${s.max}  →  ${have + 1}`, cx + cardW/2, cy + 110);
    ctx.fillStyle = '#fff';
    ctx.font = '22px "Microsoft JhengHei"';
    fillWrapped(s.desc, cx + cardW/2, cy + 170, cardW - 36, 28);
    ctx.fillStyle = '#3cf';
    ctx.font = 'bold 52px "Courier New"';
    ctx.fillText(`[${i+1}]`, cx + cardW/2, cy + cardH - 40);
  }
}

// ============================================================================
// HUD
// ============================================================================
function drawHud() {
  // hearts
  if (imgs.heart.complete) {
    for (let i = 0; i < player.maxHp; i++) {
      ctx.save();
      if (i >= player.hp) ctx.globalAlpha = 0.22;
      ctx.drawImage(imgs.heart, 24 + i * 52, 24, 46, 46);
      ctx.restore();
    }
  }
  // canisters below hearts
  if (imgs.can.complete) {
    for (let i = 0; i < player.maxCanisters; i++) {
      ctx.save();
      if (i >= player.canisters) ctx.globalAlpha = 0.22;
      ctx.drawImage(imgs.can, 24 + i * 52, 82, 46, 46);
      ctx.restore();
    }
  }
  // (pig charges HUD rendered as DOM <img> — see syncMinions / #pig-hud)
  // timer top-right
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.font = 'bold 42px "Courier New"';
  const m = Math.floor(elapsed/60), s = Math.floor(elapsed%60);
  const timeStr = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  ctx.strokeText(timeStr, W - 24, 54);
  ctx.fillText(timeStr, W - 24, 54);
  ctx.fillStyle = '#ffd84d';
  ctx.font = 'bold 28px "Microsoft JhengHei"';
  ctx.strokeText(`Lv ${player.level}`, W - 24, 92);
  ctx.fillText(`Lv ${player.level}`, W - 24, 92);
  // XP bar bottom
  const bw = W - 80, bx = 40, by = H - 26;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(bx, by, bw, 14);
  const frac = Math.min(1, player.xp / player.xpNeeded);
  ctx.fillStyle = '#4df';
  ctx.fillRect(bx, by, bw * frac, 14);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, 14);
  // boss HP bar
  if (boss && boss.hp > 0) {
    const bpW = 780, bpH = 30;
    const bpX = (W - bpW) / 2, bpY = 22;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(bpX, bpY, bpW, bpH);
    const hf = Math.max(0, boss.hp / boss.maxHp);
    ctx.fillStyle = '#e22';
    ctx.fillRect(bpX, bpY, bpW * hf, bpH);
    ctx.strokeStyle = '#ffd84d';
    ctx.lineWidth = 3;
    ctx.strokeRect(bpX, bpY, bpW, bpH);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 22px "Microsoft JhengHei"';
    ctx.fillText(`BOSS ${Math.ceil(boss.hp)}/${boss.maxHp}`, W/2, bpY + 22);
  }
}

function drawBossIntro() {
  if (!bossSpawned || !boss) return;
  const t = performance.now() - bossIntroStart;
  if (t > 2000) return;
  const frac = t / 2000;
  const alpha = frac < 0.3 ? frac/0.3 : frac > 0.8 ? (1 - frac)/0.2 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, H/2 - 100, W, 200);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 130px "Microsoft JhengHei"';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 8;
  ctx.fillStyle = '#ff3030';
  ctx.strokeText('BOSS 登場', W/2, H/2);
  ctx.fillText('BOSS 登場', W/2, H/2);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

// ============================================================================
// Draw main
// ============================================================================
function drawGame() {
  const now = performance.now();
  // 防禦：若 state 不是 ult 但 ult-img 仍顯示（可能殘留），強制隱藏
  if (state !== 'ult') {
    const ui = document.getElementById('ult-img');
    if (ui && ui.style.display !== 'none') ui.style.display = 'none';
  }
  const shaking = now < shakeUntil;
  ctx.save();
  if (shaking) {
    const k = (shakeUntil - now) / 400;  // 隨時間衰減
    const amt = shakeAmount * k;
    ctx.translate((Math.random() - 0.5) * amt * 2, (Math.random() - 0.5) * amt * 2);
  }
  drawBg();
  drawFlags();
  drawParticles();
  for (const p of pickups) drawPickup(p);
  drawDeathAnims();
  for (const e of enemies) drawEnemy(e);
  // BOSS 視覺：chase / dash / jumping 時畫（shadow/summoning 隱藏因為飛出螢幕或隱身）
  if (boss && (boss.ai === 'chase' || boss.ai === 'dashWarn' || boss.ai === 'dashing' || boss.ai === 'jumping')) {
    drawEnemy(boss);
  }
  drawShadows();
  drawDashWarning();
  for (const p of projectiles) drawProjectile(p);
  drawPlayer();
  drawSlashHits();
  drawHitFx();
  drawDamageLabels();
  drawCritLabels();
  if (state === 'ult') drawUltEffect();
  ctx.restore();
  // HUD 不受 shake 影響
  drawHud();
  drawBossIntro();
}
