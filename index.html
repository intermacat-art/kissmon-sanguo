<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>親親獸剪紙三國</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; background:#0a0a0a; overflow:hidden;
               font-family:"Microsoft JhengHei","Noto Sans TC","Arial",sans-serif; }
  body { display:flex; justify-content:center; align-items:center; }
  #game { position:relative; width:1280px; height:720px; box-shadow:0 0 40px rgba(0,0,0,0.6); }
  canvas { display:block; background:#2a1f1b; image-rendering:auto; }
  #ult-img { position:absolute; top:0; left:0; width:100%; height:100%;
             display:none; z-index:20; object-fit:cover; }
  #loading { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center;
             color:#fff; font-size:32px; background:#000; z-index:50; cursor:pointer; gap:24px; }
  #loading .start-btn { font-size:40px; font-weight:900; padding:18px 60px; background:#ffd84d; color:#2a1f1b;
             border-radius:14px; box-shadow:0 6px 0 #8B6914; letter-spacing:2px; display:none; }
  #loading.ready .loading-text { display:none; }
  #loading.ready .start-btn { display:block; animation:pulseBtn 0.9s ease-in-out infinite alternate; }
  @keyframes pulseBtn { from { transform:scale(1); } to { transform:scale(1.06); } }
  .minion { position:absolute; left:0; top:0; pointer-events:none; display:none; z-index:5;
            image-rendering:auto; will-change:transform; transform-origin:top left;
            object-fit:contain; }
  #pig-hud { position:absolute; left:24px; top:140px; display:none; gap:6px;
             z-index:15; pointer-events:none; }
  #pig-hud img { width:46px; height:46px; display:block; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas" width="1280" height="720"></canvas>
  <img id="mn-bb" class="minion" src="a/minion/bb.gif">
  <img id="mn-kid" class="minion" src="a/minion/kid.gif">
  <div id="pig-hud"></div>
  <img id="ult-img" src="a/ult/final.jpg">
  <div id="loading">
    <div class="loading-text">Loading...</div>
    <div class="start-btn">▶  點擊開始</div>
  </div>
</div>
<script>
// ============================================================================
// Constants & Assets
// ============================================================================
const W = 1280, H = 720;
const CANVAS = document.getElementById('canvas');
const ctx = CANVAS.getContext('2d');

const IMG_PATHS = {
  bg:'a/battle.jpg', flags:'a/flags.png', menu_bg:'a/menu_bg.jpg',
  boom:'a/boom.png', hit:'a/hit.png',
  kiss1:'a/menu/kiss1.png', kiss2:'a/menu/kiss2.png', kiss3:'a/menu/kiss3.png',
  walk1:'a/mon/walk1.png', walk2:'a/mon/walk2.png', attack:'a/mon/attack.png',
  drink:'a/mon/drink.png', smoke:'a/mon/smoke.gif',
  heart:'a/item/heart.png', can:'a/item/can.png',
  rrrr:'a/dead/rrrr.png',
  lv1:'a/enemy/lv1.png',
};
const SFX_PATHS = {
  cut:'a/se/cut.aac', miss:'a/se/miss.aac', heal:'a/se/heal.aac',
  dead:'a/se/dead.aac', ult:'a/se/ult.aac',
  coin:'a/se/coin.mp3', lvup:'a/se/LVUP.mp3',
  die:'a/se/enemy_die.mp3',
  shoot:'a/se/shoot.mp3',
  magnet:'a/se/coin.mp3',   // 沿用 coin 當暫代磁鐵拾取音
};
const BGM_SRC = 'a/bgm/bgm.mp3';
const MENU_BGM_SRC = 'a/bgm/menu.mp3';

const imgs = {};
const sfx = {};
let bgm = null;
let menuBgm = null;

function loadAssets() {
  const ps = [];
  for (const k in IMG_PATHS) {
    const im = new Image();
    im.src = IMG_PATHS[k];
    imgs[k] = im;
    ps.push(new Promise(r => { im.onload = r; im.onerror = () => { console.warn('fail', IMG_PATHS[k]); r(); }; }));
  }
  for (const k in SFX_PATHS) {
    const a = new Audio(SFX_PATHS[k]);
    a.volume = 0.7;
    sfx[k] = a;
  }
  bgm = new Audio(BGM_SRC);
  bgm.loop = true;
  bgm.volume = 0.3;
  menuBgm = new Audio(MENU_BGM_SRC);
  menuBgm.loop = true;
  menuBgm.volume = 0.4;
  return Promise.all(ps);
}

function playSfx(k, vol = 1) {
  try { const a = sfx[k].cloneNode(); a.volume = sfx[k].volume * vol; a.play(); } catch (e) {}
}

// ============================================================================
// State
// ============================================================================
// states: loading, menu, play, levelup, ult, dying, dead, victory
let state = 'loading';
let last = 0;
let keys = {};

const player = {
  x: W/2, y: H/2, r: 30,
  hp: 4, maxHp: 4,
  xp: 0, level: 1, xpNeeded: 3,
  moveSpeed: 220,
  attackInterval: 900, attackCooldown: 0,
  slashRange: 220,        // 近戰 AOE 半徑
  slashDamage: 5,         // 近戰基礎傷害（較高）
  canisters: 0, maxCanisters: 2,
  iframeUntil: 0,
  facing: 1,
  walkPhase: 0,
  attackUntil: 0,
  animUntil: 0,
  animType: null,
  pigCharges: 0,
  bbOrbR: 110,            // 波貝貝繞體半徑
  bbSize: 180,            // 波貝貝顯示尺寸（寬高基底）
  kidShootInterval: 1500, // 親親子射擊間隔 ms
  kidShootDamage: 3,      // 親親子靈氣傷害
  slashVisualUntil: 0,    // 靈氣特效結束時間
  slashVisualAngle: 0,
  skills: {},
};

let enemies = [];
let projectiles = [];
let pickups = [];
let particles = [];
let boss = null;
let bossSpawned = false;
let bossIntroStart = 0;

let gameStartTime = 0;
let elapsed = 0;
let lastSpawn = 0;
let lastPickupSpawn = 0;
let killCount = 0;
let entityId = 0;
let levelUpChoices = [];
let ultStartTime = 0;
let dyingStart = 0;
let redFade = 0;

const SKILLS = {
  range:  { name:'靈氣放大',    desc:'剪刀靈氣範圍 +20%', max:5, apply:()=>{ player.slashRange *= 1.20; } },
  speed:  { name:'揮舞如風',    desc:'攻速 +15%',         max:5, apply:()=>{ player.attackInterval *= 0.85; } },
  dmg:    { name:'鋒銳之刃',    desc:'靈氣傷害 +2',       max:5, apply:()=>{ player.slashDamage += 2; } },
  move:   { name:'走位風神',    desc:'移動速度 +12%',     max:3, apply:()=>{ player.moveSpeed *= 1.12; } },
  hp:     { name:'體質強化',    desc:'血上限 +1 並回滿',  max:2, apply:()=>{ player.maxHp += 1; player.hp = player.maxHp; } },
  ammo:   { name:'奧義罐包',    desc:'奧義罐上限 +1',     max:2, apply:()=>{ player.maxCanisters += 1; } },
  bb:     { name:'波貝貝 繞圈', desc:'繞體盾彈開敵人；升級 +範圍 +大小', max:3,
            apply: () => {
              const have = player.skills.bb || 0;
              if (have === 0) {
                player.bbOrbR = 110;
                player.bbSize = 180;
              } else {
                player.bbOrbR *= 1.30;
                player.bbSize *= 1.20;
              }
            } },
  kid:    { name:'親親子 靈氣', desc:'貼身隨從，自動向敵人射靈氣', max:3,
            apply: () => {
              const have = player.skills.kid || 0;
              if (have === 0) {
                player.kidShootInterval = 1500;
                player.kidShootDamage = 3;
              } else {
                player.kidShootInterval *= 0.82;   // 升級攻速 +22%
                player.kidShootDamage += 2;
              }
            } },
  pig:    { name:'豬鼻醬 守護', desc:'致命攻擊時擋 1 次並回滿血', max:2, apply:()=>{ player.pigCharges++; } },
};

const LV = {
  1: {
    enemyImg: 'lv1',
    enemyHp: 4,
    enemySpeed: 130,
    enemyDmg: 1,
    eliteRate: 0.12,          // 12% 機率刷精英
    bossHp: 150,
    bossSpeed: 75,
    bossTime: 80,
    bossSkill: 'jump',        // 跳躍黑影砸
    bossSkillInterval: 12000, // 每 12 秒一次
    spawnCfg: [
      { from: 0,  to: 20, interval: 1800, count: 1 },
      { from: 20, to: 45, interval: 1250, count: 1 },
      { from: 45, to: 70, interval: 900,  count: 1 },
      { from: 70, to: 80, interval: 650,  count: 2 },
    ],
  },
};
let currentLevel = 1;

const minionState = {
  bbAngle: 0, bbCooldown: 0, bbX: null, bbY: null,
  kidFloat: 0, kidCooldown: 0, kidX: null, kidY: null,
};

// ============================================================================
// Input
// ============================================================================
let pauseStart = 0;
function tryPlayMenuBgm() {
  if (state === 'menu' && menuBgm && menuBgm.paused) {
    menuBgm.play().catch(()=>{});
  }
}
addEventListener('keydown', e => {
  tryPlayMenuBgm();
  keys[e.code] = true;
  if (e.repeat) return;
  if (e.code === 'Escape') {
    e.preventDefault();
    if (state === 'play') {
      state = 'paused';
      pauseStart = performance.now();
      if (bgm) bgm.pause();
    } else if (state === 'paused') {
      const pauseDur = performance.now() - pauseStart;
      gameStartTime += pauseDur;
      last += pauseDur;
      state = 'play';
      if (bgm) bgm.play().catch(()=>{});
    }
    return;
  }
  if (state === 'paused') {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      e.preventDefault();
      const d = e.code === 'ArrowLeft' ? -0.05 : 0.05;
      if (bgm)     bgm.volume     = Math.max(0, Math.min(1, bgm.volume + d));
      if (menuBgm) menuBgm.volume = Math.max(0, Math.min(1, menuBgm.volume + d));
      for (const k in sfx) sfx[k].volume = Math.max(0, Math.min(1, sfx[k].volume + d));
      return;
    } else if (e.code === 'KeyR') {
      e.preventDefault();
      const lv = currentLevel;
      resetGame();
      currentLevel = lv;
      state = 'play';
      if (bgm) { bgm.currentTime = 0; bgm.play().catch(()=>{}); }
      return;
    } else if (e.code === 'KeyM') {
      e.preventDefault();
      goMenu();
      return;
    }
  }
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'menu') startGame();
    else if (state === 'play') tryUlt();
    else if (state === 'dead' || state === 'victory') goMenu();
  } else if (state === 'levelup') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') chooseSkill(levelUpChoices[0]);
    else if (e.code === 'Digit2' || e.code === 'Numpad2') { if (levelUpChoices[1]) chooseSkill(levelUpChoices[1]); }
    else if (e.code === 'Digit3' || e.code === 'Numpad3') { if (levelUpChoices[2]) chooseSkill(levelUpChoices[2]); }
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });

CANVAS.addEventListener('click', e => {
  tryPlayMenuBgm();
  if (state !== 'levelup') return;
  const rect = CANVAS.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const cardW = 310, cardH = 330, gap = 40;
  const totalW = cardW * 3 + gap * 2;
  const startX = (W - totalW) / 2;
  const cy = 240;
  for (let i = 0; i < levelUpChoices.length; i++) {
    const cx = startX + i * (cardW + gap);
    if (mx >= cx && mx <= cx + cardW && my >= cy && my <= cy + cardH) {
      chooseSkill(levelUpChoices[i]);
      return;
    }
  }
});

// ============================================================================
// Player
// ============================================================================
function updatePlayer(dt, now) {
  let vx = 0, vy = 0;
  if (keys.KeyW || keys.ArrowUp) vy -= 1;
  if (keys.KeyS || keys.ArrowDown) vy += 1;
  if (keys.KeyA || keys.ArrowLeft)  { vx -= 1; player.facing = -1; }
  if (keys.KeyD || keys.ArrowRight) { vx += 1; player.facing = 1; }
  if (vx || vy) {
    const l = Math.hypot(vx, vy);
    player.x += (vx/l) * player.moveSpeed * dt/1000;
    player.y += (vy/l) * player.moveSpeed * dt/1000;
    player.walkPhase += dt / 180;
  }
  player.x = Math.max(40, Math.min(W - 40, player.x));
  player.y = Math.max(60, Math.min(H - 40, player.y));

  // auto attack — 近戰 AOE
  player.attackCooldown -= dt;
  if (player.attackCooldown <= 0) {
    const t = nearestEnemy();
    if (t) {
      performSlash(now);
      player.attackCooldown = player.attackInterval;
      player.attackUntil = now + 220;
    }
  }

  // level up queue (handled after XP intake in updatePickups)
  if (state === 'play' && player.xp >= player.xpNeeded) {
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = xpCurve(player.level);
    triggerLevelUp();
  }
}

function drawPlayer() {
  const now = performance.now();
  const attacking = now < player.attackUntil;
  const moving = !!(keys.KeyW||keys.KeyA||keys.KeyS||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight);
  let img;
  if (now < player.animUntil && player.animType && imgs[player.animType] && imgs[player.animType].naturalWidth) {
    img = imgs[player.animType];
  }
  else if (attacking) img = imgs.attack;
  else if (moving) img = (Math.floor(player.walkPhase) % 2 === 0) ? imgs.walk1 : imgs.walk2;
  else img = imgs.walk1;
  if (!img || !img.naturalWidth) return;
  const w = 130;
  const h = w * img.naturalHeight / img.naturalWidth;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(player.facing, 1);
  if (now < player.iframeUntil) {
    ctx.globalAlpha = (Math.floor(now/80) % 2) ? 0.4 : 1.0;
  }
  ctx.drawImage(img, -w/2, -h/2 - 8, w, h);
  ctx.restore();
}

// ============================================================================
// Enemies & Boss
// ============================================================================
function spawnEnemy(isBoss = false) {
  const edge = (Math.random() * 4) | 0;
  const m = 60;
  let x, y;
  if (edge === 0)      { x = -m;    y = Math.random() * H; }
  else if (edge === 1) { x = W + m; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = -m; }
  else                 { x = Math.random() * W; y = H + m; }

  const cfg = LV[currentLevel];
  const img = imgs[cfg.enemyImg];
  if (isBoss) {
    boss = {
      id: ++entityId, x, y,
      hp: cfg.bossHp, maxHp: cfg.bossHp,
      speed: cfg.bossSpeed, r: 130,
      img, type: 'boss',
      w: 260, h: 260,
      dmg: 2, hitFlash: 0,
      ai: 'chase',
      lastSkillAt: performance.now(),
      shadows: [],
    };
    bossSpawned = true;
    bossIntroStart = performance.now();
  } else {
    const isElite = Math.random() < (cfg.eliteRate || 0);
    enemies.push({
      id: ++entityId, x, y,
      hp: isElite ? Math.ceil(cfg.enemyHp * 2.5) : cfg.enemyHp,
      speed: isElite ? cfg.enemySpeed * 1.15 : cfg.enemySpeed,
      r: isElite ? 38 : 32,
      img,
      w: isElite ? 84 : 70,
      h: isElite ? 84 : 70,
      dmg: isElite ? Math.ceil(cfg.enemyDmg * 1.5) : cfg.enemyDmg,
      hitFlash: 0,
      lastHitPlayer: 0,
      isElite,
      xpDrop: isElite ? 3 : 1,
    });
  }
}

function updateEnemies(dt, now) {
  // 小怪一律追玩家
  for (const e of enemies) {
    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    if (d > 2) {
      e.x += (dx/d) * e.speed * dt/1000;
      e.y += (dy/d) * e.speed * dt/1000;
    }
    if (d < e.r + player.r && now > player.iframeUntil) {
      hurtPlayer(e.dmg || 1, now);
    }
    if (e.hitFlash > 0) e.hitFlash -= dt;
  }
  enemies = enemies.filter(e => e.hp > 0);
  if (boss) updateBoss(dt, now);
  if (boss && boss.hp <= 0 && state === 'play') victory();
}

// ============================================================================
// Boss AI — state machine
// ============================================================================
function bossVulnerable() {
  return boss && (boss.ai === 'chase' || boss.ai === 'falling');
}
function allTargets() {
  return bossVulnerable() ? enemies.concat(boss) : enemies;
}

function updateBoss(dt, now) {
  if (!boss) return;
  if (boss.hitFlash > 0) boss.hitFlash -= dt;

  switch (boss.ai) {
    case 'chase': {
      const dx = player.x - boss.x, dy = player.y - boss.y;
      const d = Math.hypot(dx, dy) || 1;
      boss.x += (dx/d) * boss.speed * dt/1000;
      boss.y += (dy/d) * boss.speed * dt/1000;
      if (d < boss.r + player.r && now > player.iframeUntil) {
        hurtPlayer(boss.dmg || 2, now);
      }
      // 招式冷卻
      const cfg = LV[currentLevel];
      if (now - boss.lastSkillAt > (cfg.bossSkillInterval || 12000)) {
        beginBossSkill(now, cfg.bossSkill);
        boss.lastSkillAt = now;
      }
      break;
    }
    case 'jumping': {
      // 0 → 400ms 飛上天（離畫面）
      const t = (now - boss.jumpStart) / 400;
      if (t >= 1) {
        // 進入黑影警告階段
        boss.ai = 'shadow';
        boss.shadowStart = now;
        // 鎖定玩家當下位置
        boss.shadows = [{
          x: player.x, y: player.y,
          r: 130,
          fallAt: now + 2000,
        }];
      } else {
        // 視覺：boss 移到畫面外（y 往上）
        boss.jumpY = boss.jumpStartY * (1 - t) + (-300) * t;
      }
      break;
    }
    case 'shadow': {
      // 黑影警告 2s，時間到 → falling
      const sh = boss.shadows[0];
      if (!sh) { boss.ai = 'chase'; break; }
      if (now >= sh.fallAt) {
        boss.ai = 'falling';
        boss.fallStart = now;
        boss.fallTarget = { x: sh.x, y: sh.y, r: sh.r };
      }
      break;
    }
    case 'falling': {
      const t = (now - boss.fallStart) / 180;   // 0.18s 快速下墜
      if (t >= 1) {
        // 落地
        const tgt = boss.fallTarget;
        boss.x = tgt.x; boss.y = tgt.y;
        // 傷害結算：玩家在圓內 → 扣 3 血
        const d = Math.hypot(player.x - tgt.x, player.y - tgt.y);
        if (d < tgt.r && now > player.iframeUntil) {
          hurtPlayer(3, now);
        }
        // 螢幕震動
        triggerShake(14, 400);
        spawnParticles(tgt.x, tgt.y, 40, '#ffcc33');
        playSfx('dead', 0.55);
        boss.shadows = [];
        boss.ai = 'chase';
        boss.lastSkillAt = now;   // 重置冷卻從落地算
      }
      break;
    }
  }
}

function beginBossSkill(now, skill) {
  if (skill === 'jump') {
    boss.ai = 'jumping';
    boss.jumpStart = now;
    boss.jumpStartY = boss.y;
  }
  // 之後可擴 dash / summon / tripleJump / mixed
}

function drawShadows() {
  if (!boss || !boss.shadows || !boss.shadows.length) return;
  const now = performance.now();
  for (const sh of boss.shadows) {
    const remain = sh.fallAt - now;
    const total = 2000;
    const t = Math.max(0, Math.min(1, 1 - remain / total));   // 0 → 1
    ctx.save();
    // 黑影主體
    ctx.fillStyle = `rgba(0, 0, 0, ${0.42 + t * 0.22})`;
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, sh.r, 0, Math.PI * 2);
    ctx.fill();
    // 外圈紅色警告圈（越接近落地越大）
    ctx.strokeStyle = `rgba(255, 40, 40, ${0.7 + Math.sin(now/80)*0.3})`;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, sh.r * (1 + (1 - t) * 0.25), 0, Math.PI * 2);
    ctx.stroke();
    // 倒數圓弧
    ctx.strokeStyle = '#ff3030';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, sh.r - 12, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * (1 - t));
    ctx.stroke();
    // 中央「!」
    ctx.fillStyle = '#ff2030';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4;
    ctx.font = 'bold 82px "Microsoft JhengHei"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('!', sh.x, sh.y);
    ctx.fillText('!', sh.x, sh.y);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }
}

// 螢幕震動
let shakeAmount = 0;
let shakeUntil = 0;
function triggerShake(amt, dur) {
  shakeAmount = amt;
  shakeUntil = performance.now() + dur;
}

function drawEnemy(e) {
  if (!e.img || !e.img.naturalWidth) return;
  ctx.save();
  if (e.hitFlash > 0) {
    ctx.shadowColor = '#ff4040';
    ctx.shadowBlur = 28;
  }
  if (e.isElite) {
    ctx.filter = 'hue-rotate(35deg) saturate(2.1) brightness(1.15)';
    ctx.shadowColor = '#ffd000';
    ctx.shadowBlur = 22;
  }
  ctx.drawImage(e.img, e.x - e.w/2, e.y - e.h/2, e.w, e.h);
  ctx.restore();
}

// ============================================================================
// Projectiles (player slash + minion bb)
// ============================================================================
function nearestEnemy() {
  let best = null, bestD = Infinity;
  const all = allTargets();
  for (const e of all) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < bestD && d < player.slashRange) { bestD = d; best = e; }
  }
  return best;
}

function performSlash(now) {
  // 近戰 AOE — 以玩家為中心的圓範圍，立即對範圍內所有敵人造成傷害
  const R = player.slashRange;
  const all = allTargets();
  let anyHit = false;
  for (const e of all) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < R + e.r) {
      e.hp -= player.slashDamage;
      e.hitFlash = 160;
      spawnParticles(e.x, e.y, 6, '#ffb0b0');
      if (e.hp <= 0 && e !== boss) onEnemyKill(e);
      anyHit = true;
    }
  }
  // 特效持續時間
  player.slashVisualUntil = now + 380;
  player.slashVisualAngle = (Math.random() - 0.5) * 0.5;
  playSfx('cut', anyHit ? 0.8 : 0.4);
}

function updateProjectiles(dt) {
  const all = allTargets();
  for (const p of projectiles) {
    p.x += p.vx * dt/1000;
    p.y += p.vy * dt/1000;
    p.life -= dt;
    for (const e of all) {
      if (p.hitIds.has(e.id)) continue;
      const d = Math.hypot(e.x - p.x, e.y - p.y);
      if (d < e.r + p.r) {
        e.hp -= p.dmg;
        e.hitFlash = 160;
        p.hitIds.add(e.id);
        spawnParticles(p.x, p.y, 6, '#fffacd');
        if (p.pierce <= 0) { p.life = 0; break; }
        p.pierce--;
        if (e.hp <= 0 && e !== boss) onEnemyKill(e);
      }
    }
  }
  projectiles = projectiles.filter(p =>
    p.life > 0 && p.x > -120 && p.x < W + 120 && p.y > -120 && p.y < H + 120);
}

function drawSlashVisual() {
  const now = performance.now();
  if (now >= player.slashVisualUntil) return;
  const img = imgs.boom;
  if (!img || !img.complete || !img.naturalWidth) return;
  const remain = player.slashVisualUntil - now;
  const total = 380;
  const t = 1 - remain / total;       // 0 → 1
  const alpha = t < 0.55 ? 1 : Math.max(0, 1 - (t - 0.55) / 0.45);
  const scale = 0.7 + t * 0.55;
  const targetW = player.slashRange * 2.4 * scale;
  const targetH = targetW;  // boom 是正方形
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = '#ffa83a';
  ctx.shadowBlur = 22;
  ctx.translate(player.x, player.y);
  ctx.rotate(player.slashVisualAngle + t * 0.6);   // 爆炸圖輕微旋轉
  ctx.drawImage(img, -targetW/2, -targetH/2, targetW, targetH);
  ctx.restore();
}

function drawProjectile(p) {
  const img = imgs.boom;
  if (img && img.complete && img.naturalWidth) {
    const size = 58;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(performance.now() / 180 + (p.angle || 0));  // 自轉
    ctx.shadowColor = '#ffb04a';
    ctx.shadowBlur = 18;
    ctx.drawImage(img, -size/2, -size/2, size, size);
    ctx.restore();
  } else {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle || 0);
    ctx.fillStyle = p.color || '#ffb3d1';
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ============================================================================
// Pickups: xp, heart, canister
// ============================================================================
function dropXp(x, y, amount = 1) {
  pickups.push({ type:'xp', x, y, amount, r:10,
    vx:(Math.random()-0.5)*120, vy:(Math.random()-0.5)*120 });
}
function dropHeart(x, y)  { pickups.push({ type:'heart',  x, y, r:22, vx:0, vy:0 }); }
function dropCan(x, y)    { pickups.push({ type:'can',    x, y, r:24, vx:0, vy:0 }); }
function dropMagnet(x, y) { pickups.push({ type:'magnet', x, y, r:26, vx:0, vy:0 }); }

function updatePickups(dt) {
  const MAGNET = 110;
  for (const p of pickups) {
    if (p.type === 'xp') {
      const dx = player.x - p.x, dy = player.y - p.y;
      const d = Math.hypot(dx, dy);
      if (p.magnetized) {
        // 強磁吸：全畫面拉向玩家
        const f = 2400;
        p.vx += (dx/(d||1)) * f * dt/1000;
        p.vy += (dy/(d||1)) * f * dt/1000;
      } else if (d < MAGNET) {
        const f = 900 * (1 - d/MAGNET);
        p.vx += (dx/(d||1)) * f * dt/1000;
        p.vy += (dy/(d||1)) * f * dt/1000;
      }
    }
    p.x += p.vx * dt/1000;
    p.y += p.vy * dt/1000;
    p.vx *= (p.magnetized ? 0.98 : 0.92);
    p.vy *= (p.magnetized ? 0.98 : 0.92);
    const d = Math.hypot(p.x - player.x, p.y - player.y);
    if (d < player.r + p.r) { onPickup(p); p.picked = true; }
  }
  pickups = pickups.filter(p => !p.picked);
}

function onPickup(p) {
  if (p.type === 'xp') {
    player.xp += p.amount;
    spawnParticles(player.x, player.y, 4, '#6af');
    playSfx('coin', 0.5);
  } else if (p.type === 'heart') {
    if (player.hp < player.maxHp) {
      player.hp++;
      playSfx('heal');
      spawnHeartGain();
    }
    // Always play the drink animation — even when maxed, the pickup is visible
    player.animUntil = performance.now() + 650;
    player.animType = 'drink';
  } else if (p.type === 'can') {
    if (player.canisters < player.maxCanisters) {
      player.canisters++;
      playSfx('heal', 0.6);
      spawnParticles(player.x, player.y, 14, '#0cf');
    }
    player.animUntil = performance.now() + 650;
    player.animType = 'smoke';
  } else if (p.type === 'magnet') {
    // 磁鐵：場上所有 XP 標記 magnetized → updatePickups 會強力拉向玩家
    for (const pp of pickups) {
      if (pp.type === 'xp' && !pp.picked) pp.magnetized = true;
    }
    playSfx('magnet', 1.0);
    spawnParticles(player.x, player.y, 30, '#3cf');
  }
}

function drawPickup(p) {
  if (p.type === 'xp') {
    ctx.save();
    ctx.shadowColor = '#4af'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#4df';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  } else if (p.type === 'heart' && imgs.heart.complete) {
    const pulse = Math.sin(performance.now()/180) * 0.08 + 1;
    const s = 46 * pulse;
    ctx.save();
    ctx.shadowColor = '#f66'; ctx.shadowBlur = 18;
    ctx.drawImage(imgs.heart, p.x - s/2, p.y - s/2, s, s);
    ctx.restore();
  } else if (p.type === 'can' && imgs.can.complete) {
    const pulse = Math.sin(performance.now()/180) * 0.08 + 1;
    const s = 56 * pulse;
    ctx.save();
    ctx.shadowColor = '#0cf'; ctx.shadowBlur = 18;
    ctx.drawImage(imgs.can, p.x - s/2, p.y - s/2, s, s);
    ctx.restore();
  } else if (p.type === 'magnet') {
    const now = performance.now();
    const pulse = Math.sin(now/160) * 0.1 + 1;
    const s = 60 * pulse;
    ctx.save();
    ctx.shadowColor = '#ff2b2b'; ctx.shadowBlur = 22;
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.sin(now/400) * 0.08);
    // U 形磁鐵主體
    ctx.fillStyle = '#e22b2b';
    ctx.beginPath();
    ctx.arc(0, 0, s/2, Math.PI, 0, false);
    ctx.lineTo(s/2, s/3);
    ctx.lineTo(s/2 - s*0.22, s/3);
    ctx.lineTo(s/2 - s*0.22, 0);
    ctx.arc(0, 0, s/2 - s*0.22, 0, Math.PI, true);
    ctx.lineTo(-s/2 + s*0.22, s/3);
    ctx.lineTo(-s/2, s/3);
    ctx.closePath();
    ctx.fill();
    // 兩端白色極
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(-s/2, s/3, s*0.22, s*0.16);
    ctx.fillRect(s/2 - s*0.22, s/3, s*0.22, s*0.16);
    // N / S 標籤
    ctx.fillStyle = '#222';
    ctx.font = `bold ${Math.floor(s*0.18)}px "Arial Black", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', -s/2 + s*0.11, s/3 + s*0.08);
    ctx.fillText('S',  s/2 - s*0.11, s/3 + s*0.08);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
  }
}

// ============================================================================
// Particles
// ============================================================================
function spawnParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 60 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(a)*v, vy: Math.sin(a)*v,
      color, r: 2 + Math.random() * 3,
      life: 400 + Math.random() * 200,
      born: performance.now(), gravity: 200,
    });
  }
}

function spawnHeartGain() {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({
      x: player.x + Math.cos(a)*16, y: player.y + Math.sin(a)*16,
      vx: Math.cos(a)*30, vy: -80 - Math.random()*70,
      color: '#ff4e6a', r: 4 + Math.random()*3,
      life: 700, born: performance.now(), gravity: -60,
    });
  }
}

function spawnHeartLose() {
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 110 + Math.random() * 200;
    particles.push({
      x: player.x, y: player.y - 20,
      vx: Math.cos(a)*v, vy: Math.sin(a)*v - 100,
      color: '#c81835', r: 3 + Math.random()*4,
      life: 600, born: performance.now(), gravity: 300,
    });
  }
}

function updateParticles(dt) {
  const now = performance.now();
  for (const p of particles) {
    p.x += p.vx * dt/1000;
    p.y += p.vy * dt/1000;
    p.vy += (p.gravity || 200) * dt/1000;
    p.vx *= 0.98;
  }
  particles = particles.filter(p => now - p.born < p.life);
}

function drawParticles() {
  const now = performance.now();
  for (const p of particles) {
    const t = (now - p.born) / p.life;
    ctx.globalAlpha = Math.max(0, 1 - t);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================================
// Minions
// ============================================================================
function updateMinions(dt, now) {
  // BB (波貝貝) — 繞體盾，碰到敵人把他們彈開 + 輕傷
  if (player.skills.bb) {
    minionState.bbAngle = (minionState.bbAngle || 0) + dt * 0.0038;
    const r = player.bbOrbR || 110;
    const bx = player.x + Math.cos(minionState.bbAngle) * r;
    const by = player.y + Math.sin(minionState.bbAngle) * r;
    minionState.bbX = bx;
    minionState.bbY = by;
    const BB_HIT_R = (player.bbSize || 80) * 0.6;
    minionState.bbCooldown -= dt;
    const all = allTargets();
    for (const e of all) {
      const dx = e.x - bx, dy = e.y - by;
      const d = Math.hypot(dx, dy) || 1;
      const touch = BB_HIT_R + e.r;
      if (d < touch) {
        // 彈開：把敵人位移出碰撞圈外 + 多推 20px
        const nx = dx / d, ny = dy / d;
        const push = (touch - d) + 20;
        if (e !== boss) { e.x += nx * push; e.y += ny * push; }
        // 每個敵人 350ms 才能再被 bb 傷害一次，避免一 frame 秒殺
        e.bbHitUntil = e.bbHitUntil || 0;
        if (now >= e.bbHitUntil) {
          e.hp -= 1;
          e.hitFlash = 120;
          e.bbHitUntil = now + 350;
          spawnParticles(bx, by, 3, '#ffb0b0');
          if (e.hp <= 0 && e !== boss) onEnemyKill(e);
        }
      }
    }
  }

  // KID (親親子) — 貼身跟隨 + 自動向最近敵人射靈氣
  if (player.skills.kid) {
    minionState.kidFloat = (minionState.kidFloat || 0) + dt * 0.004;
    const offsetX = 60 * (player.facing >= 0 ? -1 : 1);
    const offsetY = -20;
    const fx = Math.sin(minionState.kidFloat) * 5;
    const fy = Math.cos(minionState.kidFloat * 0.7) * 6;
    minionState.kidX = player.x + offsetX + fx;
    minionState.kidY = player.y + offsetY + fy;
    // 射擊 cooldown
    minionState.kidShootCooldown = (minionState.kidShootCooldown || 0) - dt;
    if (minionState.kidShootCooldown <= 0) {
      const t = nearestEnemy();
      if (t) {
        const dx = t.x - minionState.kidX;
        const dy = t.y - minionState.kidY;
        const d = Math.hypot(dx, dy) || 1;
        const speed = 620;
        projectiles.push({
          x: minionState.kidX, y: minionState.kidY,
          vx: (dx/d) * speed, vy: (dy/d) * speed,
          life: 2000,
          dmg: player.kidShootDamage || 3,
          pierce: 1, r: 18,
          source: 'kid', hitIds: new Set(),
          angle: Math.atan2(dy, dx), color: '#ffb3d1',
        });
        minionState.kidShootCooldown = player.kidShootInterval || 1500;
        playSfx('shoot', 0.45);
      }
    }
  }
}

const bbEl  = () => document.getElementById('mn-bb');
const kidEl = () => document.getElementById('mn-kid');
const pigHudEl = () => document.getElementById('pig-hud');
const BB_SIZE = 80, KID_SIZE = 80;

function syncMinions(now) {
  const onStage = (state === 'play' || state === 'levelup' || state === 'ult' || state === 'dying');

  // BB (波貝貝) — 繞體盾（升級變大）
  const bb = bbEl();
  if (onStage && player.skills.bb) {
    const x = minionState.bbX ?? player.x;
    const y = minionState.bbY ?? player.y;
    const size = player.bbSize || BB_SIZE;
    bb.style.display = 'block';
    bb.style.width = size + 'px';
    bb.style.height = size + 'px';
    bb.style.transform = `translate(${x - size/2}px, ${y - size/2}px)`;
  } else {
    bb.style.display = 'none';
  }

  // KID (親親子) — 貼身跟隨
  const kid = kidEl();
  if (onStage && player.skills.kid) {
    const x = minionState.kidX ?? player.x;
    const y = minionState.kidY ?? player.y;
    kid.style.display = 'block';
    kid.style.width = KID_SIZE + 'px';
    kid.style.height = KID_SIZE + 'px';
    kid.style.transform = `translate(${x - KID_SIZE/2}px, ${y - KID_SIZE/2}px)`;
  } else {
    kid.style.display = 'none';
  }

  // Pig HUD — N charges as GIFs top-left
  const pigHud = pigHudEl();
  if (onStage && player.pigCharges > 0) {
    const want = player.pigCharges;
    while (pigHud.children.length < want) {
      const img = document.createElement('img');
      img.src = 'a/minion/pig.gif';
      pigHud.appendChild(img);
    }
    while (pigHud.children.length > want) pigHud.removeChild(pigHud.lastChild);
    pigHud.style.display = 'flex';
  } else {
    pigHud.style.display = 'none';
  }
}

// ============================================================================
// Spawner
// ============================================================================
function updateSpawner(dt, now) {
  const cfg = LV[currentLevel];
  if (!bossSpawned && elapsed >= cfg.bossTime) {
    spawnEnemy(true);
  }
  if (!bossSpawned) {
    let wave = null;
    for (const w of cfg.spawnCfg) {
      if (elapsed >= w.from && elapsed < w.to) { wave = w; break; }
    }
    if (wave && now - lastSpawn > wave.interval) {
      lastSpawn = now;
      for (let i = 0; i < wave.count; i++) spawnEnemy();
    }
  }
  if (now - lastPickupSpawn > 22000) {
    lastPickupSpawn = now;
    const type = Math.random() < 0.55 ? 'heart' : 'can';
    pickups.push({
      type, r: type === 'heart' ? 22 : 24,
      x: 100 + Math.random() * (W - 200),
      y: 120 + Math.random() * (H - 240),
      vx: 0, vy: 0,
    });
  }
}

// ============================================================================
// Combat events
// ============================================================================
function onEnemyKill(e) {
  killCount++;
  playSfx('die', 0.75);
  const r = Math.random();
  if (r < 0.04)      dropHeart(e.x, e.y);
  else if (r < 0.08) dropCan(e.x, e.y);
  else if (r < 0.12) dropMagnet(e.x, e.y);
  else               dropXp(e.x, e.y, e.xpDrop || 1);
  spawnParticles(e.x, e.y, 8, '#ffee7a');
}

function hurtPlayer(dmg, now) {
  if (state !== 'play') return;
  // 豬鼻醬 save: any hit that would kill
  if (player.hp - dmg <= 0 && player.pigCharges > 0) {
    player.pigCharges--;
    player.hp = player.maxHp;
    player.iframeUntil = now + 1600;
    playSfx('heal');
    spawnParticles(player.x, player.y, 50, '#ffc0cb');
    spawnHeartGain();
    player.animUntil = now + 1100;
    player.animType = 'drink';
    return;
  }
  player.hp -= dmg;
  player.iframeUntil = now + 800;
  spawnHeartLose();
  playSfx('miss', 0.7);
  if (player.hp <= 0) { player.hp = 0; startDying(now); }
}

// ============================================================================
// Level up
// ============================================================================
function xpCurve(lv) {
  return Math.floor(3 + (lv - 1) * 2 + Math.pow(lv - 1, 1.5) * 1.5);
}

function triggerLevelUp() {
  state = 'levelup';
  const pool = [];
  for (const k in SKILLS) {
    const have = player.skills[k] || 0;
    if (have < SKILLS[k].max) pool.push(k);
  }
  pool.sort(() => Math.random() - 0.5);
  levelUpChoices = pool.slice(0, 3);
  if (bgm) bgm.volume = 0.1;
  playSfx('lvup', 0.9);
}

function chooseSkill(k) {
  if (!k) return;
  SKILLS[k].apply();
  player.skills[k] = (player.skills[k] || 0) + 1;
  spawnParticles(player.x, player.y, 25, '#ffd84d');
  if (player.xp >= player.xpNeeded) {
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = xpCurve(player.level);
    triggerLevelUp();
  } else {
    state = 'play';
    if (bgm) bgm.volume = 0.3;
  }
}

// ============================================================================
// Ult
// ============================================================================
let ultExplosions = [];   // [{x,y,isBoss}]

function tryUlt() {
  if (player.canisters <= 0) return;
  player.canisters--;
  state = 'ult';
  ultStartTime = performance.now();
  // 記錄當下每個敵人位置 — 爆炸期間用
  ultExplosions = [];
  for (const e of enemies) ultExplosions.push({ x: e.x, y: e.y });
  if (boss && bossVulnerable()) ultExplosions.push({ x: boss.x, y: boss.y, isBoss: true });
  playSfx('ult', 1.0);
  if (bgm) bgm.volume = 0.05;
}

function drawUltEffect() {
  const now = performance.now();
  const t = now - ultStartTime;
  if (t < 1000) {
    // 凍結期：畫面漸強光暈
    const k = Math.sin((t / 1000) * Math.PI);   // 0 → 1 → 0
    ctx.fillStyle = `rgba(255, 240, 140, ${k * 0.45})`;
    ctx.fillRect(0, 0, W, H);
    // 中心光環（玩家位置）
    const g = ctx.createRadialGradient(player.x, player.y, 20, player.x, player.y, 600 * k);
    g.addColorStop(0, `rgba(255, 230, 100, ${0.7 * k})`);
    g.addColorStop(1, 'rgba(255, 230, 100, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  } else if (t < 1800) {
    // 爆炸期 800ms：每個敵人位置畫 boom.png
    const et = (t - 1000) / 800;
    const img = imgs.boom;
    if (!img || !img.complete || !img.naturalWidth) return;
    for (const ex of ultExplosions) {
      const size = (ex.isBoss ? 380 : 220) * (0.5 + et * 0.85);
      const alpha = et < 0.65 ? 1 : Math.max(0, 1 - (et - 0.65) / 0.35);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(ex.x, ex.y);
      ctx.rotate(et * 0.8);
      ctx.drawImage(img, -size/2, -size/2, size, size);
      ctx.restore();
    }
  }
}

function finishUltScreen() {
  for (const e of enemies) {
    dropXp(e.x, e.y, 2);
    killCount++;
  }
  enemies = [];
  if (boss) {
    const dmg = Math.floor(boss.maxHp * 0.3);
    boss.hp = Math.max(1, boss.hp - dmg);
    boss.hitFlash = 300;
  }
  ultExplosions = [];
  triggerShake(10, 300);
  state = 'play';
  if (bgm) bgm.volume = 0.3;
}

// ============================================================================
// Dying / Dead / Victory
// ============================================================================
function startDying(now) {
  state = 'dying';
  dyingStart = now;
  redFade = 0;
  if (bgm) bgm.pause();
  playSfx('dead', 1.0);
}

function updateDying(dt, now) {
  const t = (now - dyingStart) / 1800;
  redFade = Math.min(1, t);
  if (t >= 1) state = 'dead';
}

function drawDyingOverlay() {
  if (redFade <= 0) return;
  if (redFade < 0.55) {
    ctx.fillStyle = `rgba(200, 20, 20, ${redFade * 1.1})`;
  } else {
    ctx.fillStyle = `rgba(0,0,0, ${(redFade - 0.45) * 1.8})`;
  }
  ctx.fillRect(0, 0, W, H);
}

function drawDead() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const r = imgs.rrrr;
  if (r && r.complete && r.naturalWidth) {
    const scale = Math.min(W*0.78 / r.naturalWidth, H*0.68 / r.naturalHeight);
    const w = r.naturalWidth * scale;
    const h = r.naturalHeight * scale;
    ctx.drawImage(r, (W-w)/2, (H-h)/2 - 30, w, h);
  }
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.font = 'bold 40px "Microsoft JhengHei"';
  ctx.textAlign = 'center';
  ctx.strokeText('按 SPACE 重新開始', W/2, H - 60);
  ctx.fillText('按 SPACE 重新開始', W/2, H - 60);
}

function victory() {
  state = 'victory';
  if (bgm) bgm.pause();
  spawnParticles(W/2, H/2, 80, '#ffd84d');
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd84d';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 6;
  ctx.font = 'bold 96px "Microsoft JhengHei"';
  ctx.strokeText('第一關 通關', W/2, H/2 - 80);
  ctx.fillText('第一關 通關', W/2, H/2 - 80);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px "Microsoft JhengHei"';
  ctx.fillText(`存活 ${elapsed.toFixed(1)} 秒 · 擊殺 ${killCount}`, W/2, H/2 + 10);
  ctx.fillStyle = '#8f8';
  ctx.font = 'bold 32px "Microsoft JhengHei"';
  ctx.fillText('按 SPACE 回主選單', W/2, H/2 + 90);
}

// ============================================================================
// Menu / Background
// ============================================================================
function drawBg() {
  if (imgs.bg && imgs.bg.complete && imgs.bg.naturalWidth) {
    ctx.drawImage(imgs.bg, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#3a2d24';
    ctx.fillRect(0, 0, W, H);
  }
}
function drawFlags() {
  if (imgs.flags && imgs.flags.complete && imgs.flags.naturalWidth) {
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.drawImage(imgs.flags, 0, 0, W, H);
    ctx.restore();
  }
}

function drawMenu() {
  if (imgs.menu_bg && imgs.menu_bg.complete && imgs.menu_bg.naturalWidth) {
    ctx.drawImage(imgs.menu_bg, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#2a1f1b';
    ctx.fillRect(0, 0, W, H);
  }
  const t = performance.now();
  // 親親獸 kiss 動畫（左下角貼齊下緣，loop kiss1→kiss2→kiss3）
  const kissFrames = [imgs.kiss1, imgs.kiss2, imgs.kiss3];
  const kImg = kissFrames[Math.floor(t / 220) % 3];
  if (kImg && kImg.complete && kImg.naturalWidth) {
    const targetH = 570;   // 380 * 1.5
    const targetW = targetH * (kImg.naturalWidth / kImg.naturalHeight);
    ctx.drawImage(kImg, 0, H - targetH, targetW, targetH);
  }
  // SPACE 提示（底部中央，脈動）
  const pulse = 0.55 + 0.45 * Math.sin(t / 320);
  ctx.textAlign = 'center';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(60, 20, 10, 0.85)';
  ctx.lineWidth = 8;
  ctx.fillStyle = `rgba(255, 240, 140, ${pulse})`;
  ctx.font = 'bold 54px "Microsoft JhengHei"';
  ctx.strokeText('按 SPACE 開始遊戲', W/2, H - 120);
  ctx.fillText('按 SPACE 開始遊戲', W/2, H - 120);
  // 操作說明
  ctx.strokeStyle = 'rgba(30, 15, 10, 0.8)';
  ctx.lineWidth = 5;
  ctx.fillStyle = '#fff8dc';
  ctx.font = 'bold 24px "Microsoft JhengHei"';
  ctx.strokeText('WASD / 方向鍵 移動    SPACE 奧義（累積罐頭後釋放）', W/2, H - 58);
  ctx.fillText('WASD / 方向鍵 移動    SPACE 奧義（累積罐頭後釋放）', W/2, H - 58);
}

// ============================================================================
// Level up modal
// ============================================================================
function drawLevelUp() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd84d';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 5;
  ctx.font = 'bold 70px "Microsoft JhengHei"';
  ctx.strokeText(`LEVEL ${player.level}`, W/2, 120);
  ctx.fillText(`LEVEL ${player.level}`, W/2, 120);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px "Microsoft JhengHei"';
  ctx.fillText('選擇強化（點卡片 或 按 1/2/3）', W/2, 175);

  const cardW = 310, cardH = 330, gap = 40;
  const totalW = cardW * 3 + gap * 2;
  const startX = (W - totalW) / 2;
  const cy = 240;
  for (let i = 0; i < levelUpChoices.length; i++) {
    const k = levelUpChoices[i];
    const s = SKILLS[k];
    const cx = startX + i * (cardW + gap);
    ctx.fillStyle = 'rgba(40, 30, 55, 0.95)';
    ctx.fillRect(cx, cy, cardW, cardH);
    ctx.strokeStyle = '#ffd84d';
    ctx.lineWidth = 4;
    ctx.strokeRect(cx, cy, cardW, cardH);
    ctx.fillStyle = '#ffd84d';
    ctx.font = 'bold 36px "Microsoft JhengHei"';
    ctx.fillText(s.name, cx + cardW/2, cy + 70);
    const have = player.skills[k] || 0;
    ctx.fillStyle = '#aaf';
    ctx.font = 'bold 22px "Microsoft JhengHei"';
    ctx.fillText(`等級 ${have}/${s.max}  →  ${have + 1}`, cx + cardW/2, cy + 110);
    ctx.fillStyle = '#fff';
    ctx.font = '24px "Microsoft JhengHei"';
    ctx.fillText(s.desc, cx + cardW/2, cy + 180);
    ctx.fillStyle = '#ffd84d';
    ctx.font = 'bold 52px "Courier New"';
    ctx.fillText(`[${i+1}]`, cx + cardW/2, cy + cardH - 40);
  }
}

// ============================================================================
// HUD
// ============================================================================
function drawHud() {
  // hearts
  if (imgs.heart.complete) {
    for (let i = 0; i < player.maxHp; i++) {
      ctx.save();
      if (i >= player.hp) ctx.globalAlpha = 0.22;
      ctx.drawImage(imgs.heart, 24 + i * 52, 24, 46, 46);
      ctx.restore();
    }
  }
  // canisters below hearts
  if (imgs.can.complete) {
    for (let i = 0; i < player.maxCanisters; i++) {
      ctx.save();
      if (i >= player.canisters) ctx.globalAlpha = 0.22;
      ctx.drawImage(imgs.can, 24 + i * 52, 82, 46, 46);
      ctx.restore();
    }
  }
  // (pig charges HUD rendered as DOM <img> — see syncMinions / #pig-hud)
  // timer top-right
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.font = 'bold 42px "Courier New"';
  const m = Math.floor(elapsed/60), s = Math.floor(elapsed%60);
  const timeStr = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  ctx.strokeText(timeStr, W - 24, 54);
  ctx.fillText(timeStr, W - 24, 54);
  ctx.fillStyle = '#ffd84d';
  ctx.font = 'bold 28px "Microsoft JhengHei"';
  ctx.strokeText(`Lv ${player.level}`, W - 24, 92);
  ctx.fillText(`Lv ${player.level}`, W - 24, 92);
  // XP bar bottom
  const bw = W - 80, bx = 40, by = H - 26;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(bx, by, bw, 14);
  const frac = Math.min(1, player.xp / player.xpNeeded);
  ctx.fillStyle = '#4df';
  ctx.fillRect(bx, by, bw * frac, 14);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, 14);
  // boss HP bar
  if (boss && boss.hp > 0) {
    const bpW = 780, bpH = 30;
    const bpX = (W - bpW) / 2, bpY = 22;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(bpX, bpY, bpW, bpH);
    const hf = Math.max(0, boss.hp / boss.maxHp);
    ctx.fillStyle = '#e22';
    ctx.fillRect(bpX, bpY, bpW * hf, bpH);
    ctx.strokeStyle = '#ffd84d';
    ctx.lineWidth = 3;
    ctx.strokeRect(bpX, bpY, bpW, bpH);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 22px "Microsoft JhengHei"';
    ctx.fillText(`BOSS ${Math.ceil(boss.hp)}/${boss.maxHp}`, W/2, bpY + 22);
  }
}

function drawBossIntro() {
  if (!bossSpawned || !boss) return;
  const t = performance.now() - bossIntroStart;
  if (t > 2000) return;
  const frac = t / 2000;
  const alpha = frac < 0.3 ? frac/0.3 : frac > 0.8 ? (1 - frac)/0.2 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, H/2 - 100, W, 200);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 130px "Microsoft JhengHei"';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 8;
  ctx.fillStyle = '#ff3030';
  ctx.strokeText('BOSS 登場', W/2, H/2);
  ctx.fillText('BOSS 登場', W/2, H/2);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

// ============================================================================
// Draw main
// ============================================================================
function drawGame() {
  // 螢幕震動：translate canvas 後畫完再 restore
  const now = performance.now();
  const shaking = now < shakeUntil;
  ctx.save();
  if (shaking) {
    const k = (shakeUntil - now) / 400;  // 隨時間衰減
    const amt = shakeAmount * k;
    ctx.translate((Math.random() - 0.5) * amt * 2, (Math.random() - 0.5) * amt * 2);
  }
  drawBg();
  drawFlags();
  drawParticles();
  for (const p of pickups) drawPickup(p);
  for (const e of enemies) drawEnemy(e);
  // BOSS 只在 chase/falling 時顯示在場上
  if (boss && (boss.ai === 'chase' || boss.ai === 'falling')) {
    ctx.save();
    if (boss.ai === 'falling') {
      // 下墜中畫在 shadow 位置上方，由上往下
      const t = Math.min(1, (now - boss.fallStart) / 180);
      const tgt = boss.fallTarget;
      const fx = tgt.x;
      const fy = tgt.y - (1 - t) * 900;   // 從上方 900px 落下
      const save = { x: boss.x, y: boss.y };
      boss.x = fx; boss.y = fy;
      drawEnemy(boss);
      boss.x = save.x; boss.y = save.y;
    } else {
      drawEnemy(boss);
    }
  }
  drawShadows();
  for (const p of projectiles) drawProjectile(p);
  drawPlayer();
  drawSlashVisual();
  if (state === 'ult') drawUltEffect();
  ctx.restore();
  // HUD 不受 shake 影響
  drawHud();
  drawBossIntro();
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 標題
  ctx.fillStyle = '#ffd84d';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 7;
  ctx.font = 'bold 80px "Microsoft JhengHei"';
  ctx.strokeText('暫 停', W/2, 120);
  ctx.fillText('暫 停', W/2, 120);
  // 遊戲說明
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.lineWidth = 3;
  ctx.font = 'bold 26px "Microsoft JhengHei"';
  ctx.fillText('WASD / 方向鍵  ─  移動', W/2, 220);
  ctx.fillText('SPACE  ─  釋放奧義（累積罐頭後）', W/2, 258);
  ctx.fillText('ESC  ─  暫停 / 繼續', W/2, 296);
  // 音量
  const vol = bgm ? Math.round(bgm.volume * 100) : 30;
  ctx.fillStyle = '#8ff';
  ctx.font = 'bold 32px "Microsoft JhengHei"';
  ctx.fillText(`音量： ${vol}%`, W/2, 380);
  // 音量條
  const bw = 360, bx = (W - bw)/2, by = 400;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(bx, by, bw, 14);
  ctx.fillStyle = '#8ff';
  ctx.fillRect(bx, by, bw * (vol/100), 14);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, 14);
  ctx.fillStyle = '#ccc';
  ctx.font = '22px "Microsoft JhengHei"';
  ctx.fillText('←  →  調整音量', W/2, 450);
  // 操作按鈕
  ctx.fillStyle = '#ffd84d';
  ctx.font = 'bold 28px "Microsoft JhengHei"';
  ctx.fillText('[ ESC ]  繼續遊戲', W/2, 540);
  ctx.fillText('[ R ]  重新開始本關', W/2, 585);
  ctx.fillText('[ M ]  回主選單', W/2, 630);
  ctx.textBaseline = 'alphabetic';
}

// ============================================================================
// Game flow
// ============================================================================
function startGame() {
  resetGame();
  state = 'play';
  if (menuBgm) menuBgm.pause();
  if (bgm) { bgm.currentTime = 0; bgm.play().catch(()=>{}); }
}

function resetGame() {
  player.x = W/2; player.y = H/2;
  player.hp = 4; player.maxHp = 4;
  player.xp = 0; player.level = 1; player.xpNeeded = xpCurve(1);
  player.moveSpeed = 220;
  player.attackInterval = 900; player.attackCooldown = 0;
  player.slashRange = 220; player.slashDamage = 5;
  player.canisters = 0; player.maxCanisters = 2;
  player.iframeUntil = 0;
  player.skills = {};
  player.facing = 1;
  player.pigCharges = 0;
  player.bbOrbR = 110;
  player.bbSize = 180;
  player.kidShootInterval = 1500;
  player.kidShootDamage = 3;
  player.slashVisualUntil = 0;
  player.animUntil = 0;
  player.animType = null;
  enemies = []; projectiles = []; pickups = []; particles = [];
  boss = null; bossSpawned = false;
  gameStartTime = performance.now();
  elapsed = 0;
  lastSpawn = 0;
  lastPickupSpawn = performance.now();
  killCount = 0;
  levelUpChoices = [];
  minionState.bbCooldown = 0;
  minionState.bbAngle = 0;
  minionState.bbX = null; minionState.bbY = null;
  minionState.kidFloat = 0;
  minionState.kidCooldown = 0;
  minionState.kidShootCooldown = 0;
  minionState.kidX = null; minionState.kidY = null;
  document.getElementById('ult-img').style.display = 'none';
}

function goMenu() {
  state = 'menu';
  if (bgm) bgm.pause();
  if (menuBgm) menuBgm.play().catch(()=>{});
}

// ============================================================================
// Main loop
// ============================================================================
function mainLoop(now) {
  const dt = Math.min(50, now - last);
  last = now;
  const pnow = performance.now();

  if (state === 'play') {
    elapsed = (pnow - gameStartTime) / 1000;
    updatePlayer(dt, pnow);
    updateSpawner(dt, pnow);
    updateEnemies(dt, pnow);
    updateProjectiles(dt);
    updatePickups(dt);
    updateMinions(dt, pnow);
    updateParticles(dt);
  } else if (state === 'dying') {
    updateDying(dt, pnow);
    updateParticles(dt);
  } else if (state === 'ult') {
    if (pnow - ultStartTime > 1800) finishUltScreen();
  } else if (state === 'levelup') {
    gameStartTime += dt;       // freeze elapsed
    lastSpawn += dt;
    lastPickupSpawn += dt;
    updateParticles(dt);
  }

  if (state === 'loading') {
    // loading overlay handles visual
  } else if (state === 'menu') {
    drawMenu();
  } else if (state === 'play' || state === 'levelup' || state === 'ult' || state === 'dying' || state === 'paused') {
    drawGame();
    if (state === 'levelup') drawLevelUp();
    if (state === 'dying') drawDyingOverlay();
    if (state === 'paused') drawPauseOverlay();
  } else if (state === 'dead') {
    drawDead();
  } else if (state === 'victory') {
    drawGame();
    drawVictory();
  }

  syncMinions(pnow);

  requestAnimationFrame(mainLoop);
}

// ============================================================================
// Init
// ============================================================================
loadAssets().then(() => {
  const lo = document.getElementById('loading');
  lo.classList.add('ready');
  lo.addEventListener('click', () => {
    lo.style.display = 'none';
    state = 'menu';
    last = performance.now();
    if (menuBgm) menuBgm.play().catch(()=>{});   // 點擊已解鎖 audio，立即播
    requestAnimationFrame(mainLoop);
  }, { once: true });
});
</script>
