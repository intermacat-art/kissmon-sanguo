// ============================================================================
// Game flow
// ============================================================================
function startGame() {
  resetGame();
  if (menuBgm) menuBgm.pause();
  if (bgm) { bgm.currentTime = 0; bgm.play().catch(()=>{}); }
  enterLevelIntro();
}

function resetGame() {
  player.x = W/2; player.y = H/2;
  player.hp = 4; player.maxHp = 4;
  player.xp = 0; player.level = 1; player.xpNeeded = xpCurve(1);
  player.moveSpeed = 220;
  player.attackInterval = 900; player.attackCooldown = 0;
  player.slashRange = 264; player.slashDamage = 8.5;
  player.canisters = 0; player.maxCanisters = 2;
  player.iframeUntil = 0;
  player.skills = {};
  player.facing = 1;
  player.pigCharges = 0;
  player.bbOrbR = 110;
  player.bbSize = 180;
  player.kidShootInterval = 1500;
  player.kidShootDamage = 3;
  player.slashVisualUntil = 0;
  player.animUntil = 0;
  player.animType = null;
  player.passives = {};
  player.armor = 0;
  player.projSpeedMul = 1;
  player.critRate = 0;
  currentLevel = 1;
  enemies = []; projectiles = []; pickups = []; particles = [];
  deathAnims = []; hitFx = []; slashHits = []; critLabels = []; damageLabels = [];
  boss = null; bossSpawned = false;
  ultPhase = null;
  ultChain = []; ultTrail = []; ultHitCount = 0;
  gameStartTime = performance.now();
  elapsed = 0;
  lastSpawn = 0;
  lastPickupSpawn = performance.now();
  killCount = 0;
  levelUpChoices = [];
  minionState.bbCooldown = 0;
  minionState.bbAngle = 0;
  minionState.bbX = null; minionState.bbY = null;
  minionState.kidFloat = 0;
  minionState.kidCooldown = 0;
  minionState.kidShootCooldown = 0;
  minionState.kidX = null; minionState.kidY = null;
  document.getElementById('ult-img').style.display = 'none';
}

function goMenu() {
  state = 'menu';
  if (bgm) bgm.pause();
  if (menuBgm) menuBgm.play().catch(()=>{});
  const vid = document.getElementById('outro');
  if (vid) { vid.pause(); vid.style.display = 'none'; vid.currentTime = 0; }
  document.getElementById('ult-img').style.display = 'none';
  finalVictoryPhase = null;
  finalVictoryStart = 0;
}

// ============================================================================
// Main loop
// ============================================================================
function mainLoop(now) {
  try {
  _frameId++;   // 讓 allTargets cache 失效，每幀 recompute 一次
  const dt = Math.min(50, now - last);
  last = now;
  const pnow = performance.now();

  // Ult 超強保險：任何情境下，ultStartTime 超過 10 秒還沒 reset，強制清乾淨
  // (intro 3.6 + chain ≤ 2.8 + finale 1.4 = 7.8s，留 2s buffer)
  if (ultStartTime && pnow - ultStartTime > 10000) {
    console.warn('[ULT] super-timeout, forcing recovery');
    ultStartTime = 0;
    ultPhase = null;
    ultPhaseStart = 0;
    ultChain = [];
    ultTrail = [];
    document.getElementById('ult-img').style.display = 'none';
    if (state === 'ult') {
      state = 'play';
      if (bgm) { try { bgm.volume = 0.3; } catch(e){} }
    }
  }

  if (state === 'play') {
    elapsed = (pnow - gameStartTime) / 1000;
    updatePlayer(dt, pnow);
    updateSpawner(dt, pnow);
    updateEnemies(dt, pnow);
    updateProjectiles(dt);
    updatePickups(dt);
    updateMinions(dt, pnow);
    updateParticles(dt);
  } else if (state === 'dying') {
    updateDying(dt, pnow);
    updateParticles(dt);
  } else if (state === 'ult') {
    updateUltPhase(pnow);
    updateParticles(dt);
  } else if (state === 'levelup' || state === 'passivePick' || state === 'levelIntro') {
    gameStartTime += dt;
    lastSpawn += dt;
    lastPickupSpawn += dt;
    updateParticles(dt);
  } else if (state === 'transition') {
    updateParticles(dt);
    if (pnow - transitionStart >= 1800) startNextLevel();
  } else if (state === 'final_victory') {
    updateParticles(dt);
    const phaseT = pnow - finalVictoryStart;
    if (finalVictoryPhase === 'wait' && phaseT >= FINAL_WAIT_MS) {
      finalVictoryPhase = 'congrats';
      finalVictoryStart = pnow;
    } else if (finalVictoryPhase === 'congrats' && phaseT >= FINAL_CONGRATS_MS) {
      finalVictoryPhase = 'outro';
      finalVictoryStart = pnow;
      const vid = document.getElementById('outro');
      if (vid) {
        vid.style.display = 'block';
        vid.currentTime = 0;
        vid.volume = 1;
        vid.play().catch(()=>{});
      }
    }
  }

  if (state === 'loading') {
    // loading overlay handles visual
  } else if (state === 'menu') {
    drawMenu();
  } else if (state === 'levelIntro') {
    drawLevelIntro();
  } else if (state === 'play' || state === 'levelup' || state === 'ult' || state === 'dying' || state === 'paused' || state === 'passivePick' || state === 'transition') {
    drawGame();
    if (state === 'levelup') drawLevelUp();
    if (state === 'passivePick') drawPassivePick();
    if (state === 'dying') drawDyingOverlay();
    if (state === 'paused') drawPauseOverlay();
    if (state === 'transition') drawTransition();
  } else if (state === 'dead') {
    drawDead();
  } else if (state === 'victory') {
    drawGame();
    drawVictory();
  } else if (state === 'final_victory') {
    drawGame();
    drawFinalVictory();
  }

  try { syncMinions(pnow); } catch(e) { console.error('[syncMinions]', e); }
  } catch (e) {
    console.error('[mainLoop] caught exception, continuing next frame', e);
  }
  requestAnimationFrame(mainLoop);
}

// ============================================================================
// Init
// ============================================================================
loadAssets().then(() => {
  prerenderElites();   // 先預渲染精英變色版本
  const lo = document.getElementById('loading');
  lo.classList.add('ready');
  lo.addEventListener('click', () => {
    lo.style.display = 'none';
    state = 'menu';
    last = performance.now();
    if (menuBgm) menuBgm.play().catch(()=>{});
    requestAnimationFrame(mainLoop);
  }, { once: true });
});
